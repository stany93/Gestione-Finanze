<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanze</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid white; }
        .nav-active { color: #6366f1; font-weight: 800; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="pwa-prompt" class="hidden fixed bottom-24 left-6 right-6 z-[100] bg-slate-900 text-white p-6 rounded-[2rem] shadow-2xl flex flex-col items-center text-center border border-white/10">
        <p class="text-sm font-bold mb-4">Vuoi usare l'app a tutto schermo?</p>
        <button id="pwa-btn" class="w-full bg-indigo-500 py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest">Installa Ora</button>
    </div>

    <div id="page-dashboard" class="max-w-md mx-auto px-5 pt-10">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-extrabold text-slate-900 italic">Wallet</h1>
            <div class="flex gap-2">
                <select id="month-select" onchange="updateDate()" class="glass px-2 py-1 rounded-lg text-[10px] font-bold outline-none"></select>
                <select id="year-select" onchange="updateDate()" class="glass px-2 py-1 rounded-lg text-[10px] font-bold outline-none"></select>
            </div>
        </div>

        <div class="bg-slate-900 rounded-[2rem] p-8 text-white shadow-xl mb-6 text-center">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-2">Patrimonio</p>
            <h2 id="total-balance" class="text-4xl font-extrabold mb-6 italic">€ 0,00</h2>
            <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-4">
                <div><p class="text-[9px] text-slate-500 uppercase">Entrate</p><p id="m-inc" class="text-emerald-400 font-bold">€ 0</p></div>
                <div><p class="text-[9px] text-slate-500 uppercase">Uscite</p><p id="m-exp" class="text-rose-400 font-bold">€ 0</p></div>
            </div>
        </div>

        <div id="quick-container" class="flex gap-3 overflow-x-auto no-scrollbar mb-8 pb-2"></div>

        <div id="input-card" class="glass rounded-[2rem] p-6 shadow-lg mb-8 space-y-4">
            <div class="flex gap-2">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-slate-50 p-4 rounded-xl font-bold text-lg outline-none">
                <select id="usr" class="w-1/2 bg-slate-50 p-4 rounded-xl text-xs font-bold text-indigo-600 outline-none"></select>
            </div>
            <input type="text" id="dsc" oninput="predict(this.value)" placeholder="Descrizione..." class="w-full bg-slate-50 p-4 rounded-xl text-sm outline-none">
            <select id="cat" class="w-full bg-slate-50 p-4 rounded-xl text-sm font-bold outline-none"></select>
            <div class="flex gap-3 pt-2">
                <button onclick="save('inc')" class="flex-1 bg-slate-800 text-emerald-400 py-4 rounded-xl font-bold text-[10px] uppercase">Entrata</button>
                <button onclick="save('exp')" class="flex-1 bg-slate-800 text-rose-400 py-4 rounded-xl font-bold text-[10px] uppercase">Uscita</button>
            </div>
        </div>

        <div class="glass rounded-[2rem] p-6 mb-10"><canvas id="chartPie" class="max-h-48"></canvas></div>
        <div id="list" class="space-y-3 pb-20"></div>
    </div>

    <div id="page-settings" class="max-w-md mx-auto px-6 pt-10 hidden">
        <h1 class="text-2xl font-bold mb-8">Opzioni</h1>
        <div class="space-y-6">
            <div class="glass p-6 rounded-2xl">
                <p class="text-[10px] font-bold uppercase mb-4 text-indigo-500">Tasti Rapidi</p>
                <div id="settings-quick" class="space-y-2 mb-4"></div>
                <div class="space-y-2">
                    <input type="text" id="new-q-l" placeholder="Nome" class="w-full p-2 bg-slate-50 rounded-lg text-sm outline-none">
                    <input type="number" id="new-q-a" placeholder="€" class="w-full p-2 bg-slate-50 rounded-lg text-sm outline-none font-bold">
                    <button onclick="addQ()" class="w-full bg-indigo-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Aggiungi</button>
                </div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="w-full text-rose-300 text-[10px] font-bold py-10 uppercase">Reset Dati</button>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 bg-slate-900 h-16 rounded-full flex items-center justify-around z-50 shadow-2xl">
        <button onclick="tab('dashboard')" id="btn-dash" class="nav-active text-xl">📊</button>
        <button onclick="tab('settings')" id="btn-set" class="text-slate-500 text-xl">⚙️</button>
    </nav>

    <script>
        const monthNames = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
        let db = {
            trans: JSON.parse(localStorage.getItem('f_v25_t')) || [],
            quick: JSON.parse(localStorage.getItem('f_v25_q')) || [{l:'Casa', a:600, t:'exp'},{l:'Fibra', a:30, t:'exp'}],
            cats: JSON.parse(localStorage.getItem('f_v25_c')) || ["Casa", "Spesa", "Riccardo", "Svago", "Lavoro"]
        };
        let currentMonth = new Date().getMonth(), currentYear = new Date().getFullYear();
        let pie = null, deferredPrompt;

        // --- PWA ---
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('pwa-prompt').classList.remove('hidden');
        });
        document.getElementById('pwa-btn').addEventListener('click', async () => {
            if(!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            document.getElementById('pwa-prompt').classList.add('hidden');
        });

        // --- Logica ---
        function tab(p) {
            document.getElementById('page-dashboard').classList.toggle('hidden', p !== 'dashboard');
            document.getElementById('page-settings').classList.toggle('hidden', p !== 'settings');
            document.getElementById('btn-dash').classList.toggle('nav-active', p === 'dashboard');
            document.getElementById('btn-set').classList.toggle('nav-active', p === 'settings');
            if(p === 'settings') renderSet(); else render();
        }

        function renderSet() {
            document.getElementById('settings-quick').innerHTML = db.quick.map((s,i) => `
                <div class="flex justify-between items-center bg-white p-2 rounded-lg text-xs font-bold">
                    <span>${s.l} - €${s.a}</span>
                    <button onclick="db.quick.splice(${i},1); saveDb(); renderSet()" class="text-rose-500">✕</button>
                </div>
            `).join('');
        }

        function addQ() {
            const l = document.getElementById('new-q-l').value, a = document.getElementById('new-q-a').value;
            if(!l || !a) return;
            db.quick.push({l, a: parseFloat(a), t:'exp'});
            saveDb(); renderSet();
        }

        function predict(val) {
            const v = val.toLowerCase();
            const s = document.getElementById('cat');
            if(v.includes('spesa') || v.includes('esselunga') || v.includes('macellaio')) s.value = 'Spesa';
            if(v.includes('bolletta') || v.includes('affitto') || v.includes('fibra')) s.value = 'Casa';
            if(v.includes('pannolini') || v.includes('nido')) s.value = 'Riccardo';
        }

        function save(type) {
            const a = document.getElementById('amt').value, d = document.getElementById('dsc').value;
            if(!a || !d) return alert("Dati!");
            db.trans.unshift({ id: Date.now(), amt: parseFloat(a), dsc: d, cat: document.getElementById('cat').value, usr: document.getElementById('usr').value, type: type, date: new Date().toISOString() });
            saveDb();
            document.getElementById('amt').value = ''; document.getElementById('dsc').value = '';
            render();
        }

        function render() {
            document.getElementById('cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('usr').innerHTML = ["Stany", "Giulia"].map(u => `<option value="${u}">${u}</option>`).join('');
            document.getElementById('quick-container').innerHTML = db.quick.map(s => `
                <button onclick="document.getElementById('amt').value=${s.a}; document.getElementById('dsc').value='${s.l}'; save('${s.t}')" class="glass px-6 py-4 rounded-3xl shrink-0 text-center">
                    <p class="text-[8px] font-bold uppercase text-indigo-500">${s.l}</p>
                    <p class="text-sm font-black">€${s.a}</p>
                </button>
            `).join('');

            const filtered = db.trans.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });

            const tot = db.trans.reduce((s,t) => t.type === 'inc' ? s + t.amt : s - t.amt, 0);
            const mInc = filtered.filter(t => t.type === 'inc').reduce((s,t) => s + t.amt, 0);
            const mExp = filtered.filter(t => t.type === 'exp').reduce((s,t) => s + t.amt, 0);

            document.getElementById('total-balance').innerText = `€ ${tot.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('m-inc').innerText = `+ €${mInc}`;
            document.getElementById('m-exp').innerText = `- €${mExp}`;

            document.getElementById('list').innerHTML = filtered.map(t => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center text-sm">
                    <div><p class="font-bold">${t.dsc}</p><p class="text-[9px] text-slate-400 uppercase">${t.usr} • ${t.cat}</p></div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold ${t.type==='inc'?'text-emerald-500':'text-rose-500'}">€${t.amt}</span>
                        <button onclick="db.trans = db.trans.filter(x => x.id !== ${t.id}); saveDb(); render()" class="text-slate-300 px-2 font-bold">✕</button>
                    </div>
                </div>
            `).join('');

            updateChart(filtered);
        }

        function updateChart(data) {
            const exp = data.filter(t => t.type === 'exp');
            const catsArr = [...new Set(exp.map(t => t.cat))];
            const pData = catsArr.map(c => exp.filter(t => t.cat === c).reduce((s, t) => s + t.amt, 0));
            const ctx = document.getElementById('chartPie').getContext('2d');
            if(pie) pie.destroy();
            if(catsArr.length > 0) {
                pie = new Chart(ctx, { type: 'doughnut', data: { labels: catsArr, datasets: [{ data: pData, backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899'] }] }, options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } }, cutout: '70%' } });
            }
        }

        function saveDb() { 
            localStorage.setItem('f_v25_t', JSON.stringify(db.trans));
            localStorage.setItem('f_v25_q', JSON.stringify(db.quick));
            localStorage.setItem('f_v25_c', JSON.stringify(db.cats));
        }

        function updateDate() {
            currentMonth = parseInt(document.getElementById('month-select').value);
            currentYear = parseInt(document.getElementById('year-select').value);
            render();
        }

        window.onload = () => {
            const mS = document.getElementById('month-select'), yS = document.getElementById('year-select');
            monthNames.forEach((m, i) => mS.innerHTML += `<option value="${i}" ${i === currentMonth ? 'selected' : ''}>${m}</option>`);
            for(let y = currentYear - 1; y <= currentYear + 1; y++) yS.innerHTML += `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`;
            render();
        };
    </script>
</body>
</html>
