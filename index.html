<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanze Famiglia AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; padding-bottom: 130px; font-family: 'Inter', system-ui, sans-serif; }
        .hidden { display: none !important; }
        .nav-active { color: #6366f1; transform: translateY(-5px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes flash-green { 0% { background: #ecfdf5; border-color: #10b981; } 100% { background: white; border-color: transparent; } }
        @keyframes flash-red { 0% { background: #fef2f2; border-color: #ef4444; } 100% { background: white; border-color: transparent; } }
        .flash-inc { animation: flash-green 1.2s ease-out; }
        .flash-exp { animation: flash-red 1.2s ease-out; }

        .cat-icon {
            width: 44px; height: 44px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px; flex-shrink: 0;
        }
        .ai-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="page-dashboard" class="max-w-md mx-auto px-4 pt-8">
        <div class="flex justify-between items-end mb-8 px-1">
            <div>
                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.3em] mb-1">Riepilogo</p>
                <h1 id="month-label" class="text-3xl font-black text-slate-800 capitalize italic"></h1>
            </div>
            <select id="month-select" onchange="updateMonth(this.value)" class="bg-white px-3 py-2 rounded-xl shadow-sm border border-slate-100 text-[11px] font-bold uppercase outline-none text-slate-500"></select>
        </div>

        <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl mb-10 relative overflow-hidden">
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Disponibilità</p>
            <h2 id="total-balance" class="text-4xl font-black tracking-tighter mb-8 italic">€ 0.00</h2>
            <div class="grid grid-cols-2 gap-6 pt-6 border-t border-slate-800">
                <div><p class="text-slate-500 text-[9px] uppercase font-bold mb-1 tracking-widest">Entrate</p><p id="m-inc" class="font-bold text-emerald-400 text-lg"></p></div>
                <div><p class="text-slate-500 text-[9px] uppercase font-bold mb-1 tracking-widest">Uscite</p><p id="m-exp" class="font-bold text-rose-400 text-lg"></p></div>
            </div>
        </div>

        <div class="mb-10 overflow-x-auto whitespace-nowrap pb-2 no-scrollbar">
            <div id="quick-actions-container" class="flex gap-3 px-1"></div>
        </div>

        <div id="input-card" class="bg-white rounded-[2.5rem] p-6 shadow-xl shadow-slate-200/50 mb-10 space-y-4 border-2 border-transparent transition-all relative">
            <div id="ai-indicator" class="hidden absolute top-4 right-6 text-[9px] font-black text-indigo-400 ai-badge uppercase tracking-widest italic">AI Suggerita</div>
            
            <div class="flex gap-3">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-slate-50 rounded-2xl p-5 font-black text-xl outline-none focus:bg-slate-100 transition-colors">
                <select id="usr" class="w-1/2 bg-slate-50 rounded-2xl p-5 text-sm font-bold text-indigo-600 outline-none"></select>
            </div>
            
            <input type="text" id="dsc" oninput="predictCategory(this.value)" placeholder="Cosa hai pagato?" class="w-full bg-slate-50 rounded-2xl p-5 outline-none focus:bg-slate-100 transition-colors">
            
            <select id="cat" class="w-full bg-slate-50 rounded-2xl p-5 outline-none text-slate-600 font-bold border-none appearance-none"></select>
            
            <div class="flex gap-3 pt-2">
                <button onclick="save('inc')" class="flex-1 bg-emerald-500 text-white py-5 rounded-2xl font-black shadow-lg shadow-emerald-100 active:scale-95 transition-all text-xs uppercase tracking-widest">+ Ricevuto</button>
                <button onclick="save('exp')" class="flex-1 bg-rose-500 text-white py-5 rounded-2xl font-black shadow-lg shadow-rose-100 active:scale-95 transition-all text-xs uppercase tracking-widest">- Speso</button>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm mb-10 border border-slate-100 space-y-10">
            <canvas id="chartPie" class="max-h-52 mx-auto"></canvas>
            <canvas id="chartLine" class="max-h-40 mx-auto"></canvas>
        </div>

        <div id="list" class="space-y-4 pb-12"></div>
    </div>

    <div id="page-settings" class="max-w-md mx-auto px-4 pt-8 hidden">
        <h1 class="text-3xl font-black text-slate-800 mb-10 px-2">Opzioni</h1>
        <div class="space-y-8 pb-10">
            <div class="bg-white rounded-[2.5rem] p-7 shadow-sm border border-slate-100">
                <p class="text-[10px] font-black text-indigo-500 uppercase mb-6 tracking-widest text-center">Ricorrenti</p>
                <div id="settings-quick-list" class="space-y-3 mb-6"></div>
                <div class="p-4 bg-slate-50 rounded-2xl space-y-3">
                    <input type="text" id="new-q-label" placeholder="Etichetta" class="w-full p-3 bg-white rounded-xl text-sm border-none shadow-sm outline-none">
                    <div class="flex gap-2">
                        <input type="number" id="new-q-amt" placeholder="€" class="w-1/2 p-3 bg-white rounded-xl text-sm outline-none shadow-sm font-bold">
                        <select id="new-q-type" class="w-1/2 p-3 bg-white rounded-xl text-sm outline-none shadow-sm font-bold">
                            <option value="exp">Uscita</option>
                            <option value="inc">Entrata</option>
                        </select>
                    </div>
                    <button onclick="addQuickSetting()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest">+ Tasto</button>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] p-7 shadow-sm border border-slate-100">
                <p class="text-[10px] font-black text-indigo-500 uppercase mb-6 tracking-widest text-center">Categorie</p>
                <div id="settings-cat-list" class="space-y-2 mb-6"></div>
                <div class="flex gap-2">
                    <input type="text" id="new-cat-name" placeholder="Nome..." class="flex-1 bg-slate-50 rounded-xl p-4 text-sm outline-none border-none">
                    <button onclick="addCategory()" class="bg-slate-800 text-white px-6 rounded-xl font-bold">+</button>
                </div>
            </div>

            <button onclick="clearAllData()" class="w-full text-rose-300 text-[10px] font-black uppercase tracking-[0.3em]">Reset Totale</button>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 bg-slate-900 h-20 rounded-[2rem] flex items-center justify-around z-50 shadow-2xl">
        <button onclick="switchTab('dashboard')" id="btn-dash" class="flex flex-col items-center gap-1 nav-active transition-all duration-300">
            <span class="text-xl">📊</span><span class="text-[8px] uppercase font-black tracking-widest text-white/50">Wallet</span>
        </button>
        <button onclick="switchTab('settings')" id="btn-set" class="flex flex-col items-center gap-1 text-slate-500 transition-all duration-300">
            <span class="text-xl">⚙️</span><span class="text-[8px] uppercase font-black tracking-widest">Config</span>
        </button>
    </nav>

    <script>
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const catColors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#06b6d4', '#f97316'];

        // Dizionario per l'inferenza (Auto-Category)
        const keywordsMap = {
            'spesa': 'Spesa', 'esselunga': 'Spesa', 'conad': 'Spesa', 'coop': 'Spesa', 'lidl': 'Spesa', 'carrefour': 'Spesa',
            'affitto': 'Casa', 'condominio': 'Casa', 'bolletta': 'Casa', 'luce': 'Casa', 'gas': 'Casa', 'enel': 'Casa', 'fibra': 'Casa',
            'pizza': 'Svago', 'cena': 'Svago', 'ristorante': 'Svago', 'aperitivo': 'Svago', 'cinema': 'Svago', 'pub': 'Svago',
            'benzina': 'Mezzi', 'diesel': 'Mezzi', 'treno': 'Mezzi', 'autobus': 'Mezzi', 'tper': 'Mezzi', 'parcheggio': 'Mezzi',
            'stipendio': 'Lavoro', 'bonus': 'Lavoro', 'rimborso': 'Lavoro',
            'pannolini': 'Riccardo', 'nido': 'Riccardo', 'giochi': 'Riccardo', 'asilo': 'Riccardo',
            'farmacia': 'Salute', 'medico': 'Salute', 'dentista': 'Salute'
        };

        let transactions = JSON.parse(localStorage.getItem('fin_v12_trans')) || [];
        let quickSettings = JSON.parse(localStorage.getItem('fin_v12_quick')) || [
            { label: 'Casa', amt: 600, type: 'exp' },
            { label: 'Fibra', amt: 30, type: 'exp' },
            { label: 'Stipendio', amt: 1800, type: 'inc' }
        ];
        let categories = JSON.parse(localStorage.getItem('fin_v12_cats')) || ["Casa", "Spesa", "Riccardo", "Svago", "Mezzi", "Lavoro", "Salute"];
        let users = ["Stany", "Giulia"];

        let currentMonth = new Date().getMonth();
        let pieChart = null, lineChart = null;

        function vibrate() { if (window.navigator?.vibrate) window.navigator.vibrate(35); }

        function predictCategory(text) {
            const input = text.toLowerCase();
            const indicator = document.getElementById('ai-indicator');
            const select = document.getElementById('cat');
            
            let found = false;

            // 1. Controllo mappa parole chiave
            for (let key in keywordsMap) {
                if (input.includes(key)) {
                    const targetCat = keywordsMap[key];
                    if (categories.includes(targetCat)) {
                        select.value = targetCat;
                        found = true;
                        break;
                    }
                }
            }

            // 2. Controllo se il testo contiene direttamente il nome di una categoria
            if (!found) {
                for (let cat of categories) {
                    if (input.includes(cat.toLowerCase())) {
                        select.value = cat;
                        found = true;
                        break;
                    }
                }
            }

            // Mostra/nascondi indicatore AI
            indicator.classList.toggle('hidden', !found);
        }

        function switchTab(page) {
            vibrate();
            document.getElementById('page-dashboard').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('page-settings').classList.toggle('hidden', page !== 'settings');
            document.getElementById('btn-dash').classList.toggle('nav-active', page === 'dashboard');
            document.getElementById('btn-set').classList.toggle('nav-active', page === 'settings');
            if(page === 'dashboard') render();
            if(page === 'settings') renderSettingsPage();
        }

        function getCatIcon(name, index) {
            const color = catColors[index % catColors.length];
            return `<div class="cat-icon" style="background: ${color}15; color: ${color}">${name.charAt(0).toUpperCase()}</div>`;
        }

        function renderSettingsPage() {
            document.getElementById('settings-quick-list').innerHTML = quickSettings.map((s, i) => `
                <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <div class="flex-1">
                        <p class="text-[11px] font-black uppercase text-slate-700">${s.label}</p>
                        <p class="text-[10px] font-bold text-slate-400 italic">€ ${s.amt} (${s.type==='inc'?'Entrata':'Uscita'})</p>
                    </div>
                    <button onclick="removeQuickSetting(${i})" class="text-slate-300 px-2 font-bold text-xl">✕</button>
                </div>
            `).join('');

            document.getElementById('settings-cat-list').innerHTML = categories.map((c, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-3">
                        ${getCatIcon(c, i)}
                        <span class="text-sm font-bold text-slate-700">${c}</span>
                    </div>
                    <button onclick="removeCategory(${i})" class="text-rose-300 font-bold px-3">✕</button>
                </div>
            `).join('');
        }

        function addQuickSetting() {
            const label = document.getElementById('new-q-label').value.trim();
            const amt = document.getElementById('new-q-amt').value;
            const type = document.getElementById('new-q-type').value;
            if(!label || !amt) return;
            quickSettings.push({ label, amt: parseFloat(amt), type });
            localStorage.setItem('fin_v12_quick', JSON.stringify(quickSettings));
            document.getElementById('new-q-label').value = '';
            document.getElementById('new-q-amt').value = '';
            renderSettingsPage();
            vibrate();
        }

        function removeQuickSetting(i) {
            quickSettings.splice(i, 1);
            localStorage.setItem('fin_v12_quick', JSON.stringify(quickSettings));
            renderSettingsPage();
        }

        function addCategory() {
            const val = document.getElementById('new-cat-name').value.trim();
            if(!val) return;
            categories.push(val);
            localStorage.setItem('fin_v12_cats', JSON.stringify(categories));
            document.getElementById('new-cat-name').value = '';
            renderSettingsPage();
            vibrate();
        }

        function removeCategory(i) {
            if(confirm("Eliminare?")) {
                categories.splice(i, 1);
                localStorage.setItem('fin_v12_cats', JSON.stringify(categories));
                renderSettingsPage();
            }
        }

        function render() {
            document.getElementById('cat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('usr').innerHTML = users.map(u => `<option value="${u}">${u}</option>`).join('');
            
            document.getElementById('quick-actions-container').innerHTML = quickSettings.map(s => `
                <button onclick="addQuick('${s.label}', ${s.amt}, '${s.type}')" class="bg-white px-6 py-4 rounded-[2rem] shadow-sm border border-slate-100 shrink-0 text-center active:scale-95 transition-all">
                    <p class="text-[9px] font-black uppercase text-indigo-500 mb-1 tracking-tighter">${s.label}</p>
                    <p class="text-sm font-black text-slate-800 italic">€${s.amt}</p>
                </button>
            `).join('');

            const filtered = transactions.filter(t => new Date(t.date).getMonth() === currentMonth);
            const total = transactions.reduce((s, t) => t.type === 'inc' ? s + t.amt : s - t.amt, 0);
            const mInc = filtered.filter(t => t.type === 'inc').reduce((s, t) => s + t.amt, 0);
            const mExp = filtered.filter(t => t.type === 'exp').reduce((s, t) => s + t.amt, 0);

            document.getElementById('month-label').innerText = monthNames[currentMonth];
            document.getElementById('total-balance').innerText = `€ ${total.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('m-inc').innerText = `+ €${mInc.toFixed(0)}`;
            document.getElementById('m-exp').innerText = `- €${mExp.toFixed(0)}`;

            document.getElementById('list').innerHTML = filtered.map(t => `
                <div class="bg-white p-5 rounded-[2.2rem] shadow-sm flex justify-between items-center border border-slate-50 mb-4">
                    <div class="flex items-center gap-4 truncate">
                        ${getCatIcon(t.cat, categories.indexOf(t.cat))}
                        <div class="truncate">
                            <p class="font-bold text-slate-800 text-sm truncate">${t.dsc}</p>
                            <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${t.usr} • ${t.cat}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="font-black ${t.type === 'inc' ? 'text-emerald-500' : 'text-rose-500'} text-sm whitespace-nowrap italic">€${t.amt.toFixed(2)}</p>
                        <button onclick="deleteEntry(${t.id})" class="text-slate-200 hover:text-rose-400 font-bold px-2 text-xl">✕</button>
                    </div>
                </div>
            `).join('');
            
            updateCharts(filtered);
        }

        function deleteEntry(id) {
            if(confirm("Eliminare?")) {
                vibrate();
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('fin_v12_trans', JSON.stringify(transactions));
                render();
            }
        }

        function addQuick(label, amt, type) {
            document.getElementById('amt').value = amt;
            document.getElementById('dsc').value = label;
            predictCategory(label);
            save(type);
        }

        function save(type) {
            const a = document.getElementById('amt').value;
            const d = document.getElementById('dsc').value;
            if(!a || !d) return alert("Compila tutto!");
            vibrate();

            transactions.unshift({
                id: Date.now(), amt: parseFloat(a), dsc: d,
                cat: document.getElementById('cat').value,
                usr: document.getElementById('usr').value,
                type: type, date: new Date().toISOString()
            });

            localStorage.setItem('fin_v12_trans', JSON.stringify(transactions));
            document.getElementById('amt').value = '';
            document.getElementById('dsc').value = '';
            document.getElementById('ai-indicator').classList.add('hidden');
            
            const card = document.getElementById('input-card');
            const flashClass = type === 'inc' ? 'flash-inc' : 'flash-exp';
            card.classList.add(flashClass);
            setTimeout(() => card.classList.remove(flashClass), 1200);
            render();
        }

        function updateCharts(data) {
            const exp = data.filter(t => t.type === 'exp');
            const cats = [...new Set(exp.map(t => t.cat))];
            const pData = cats.map(c => exp.filter(t => t.cat === c).reduce((s, t) => s + t.amt, 0));

            if(pieChart) pieChart.destroy();
            pieChart = new Chart(document.getElementById('chartPie').getContext('2d'), {
                type: 'doughnut',
                data: { labels: cats, datasets: [{ data: pData, backgroundColor: catColors, borderWidth: 8, borderColor: '#ffffff', hoverOffset: 4 }] },
                options: { plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: { size: 10, weight: 'bold' } } } }, cutout: '70%' }
            });

            const last6 = [];
            for(let i = 5; i >= 0; i--) last6.push((new Date().getMonth() - i + 12) % 12);
            const lData = last6.map(m => transactions.filter(t => new Date(t.date).getMonth() === m && t.type === 'exp').reduce((s, t) => s + t.amt, 0));

            if(lineChart) lineChart.destroy();
            lineChart = new Chart(document.getElementById('chartLine').getContext('2d'), {
                type: 'line',
                data: {
                    labels: last6.map(m => monthNames[m].substring(0,3)),
                    datasets: [{ borderColor: '#6366f1', data: lData, tension: 0.4, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.05)', pointRadius: 4, pointBackgroundColor: '#fff', borderWeight: 3 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, border: { display: false } } } }
            });
        }

        const mSel = document.getElementById('month-select');
        monthNames.forEach((m, i) => { mSel.innerHTML += `<option value="${i}" ${i === currentMonth ? 'selected' : ''}>${m.substring(0,3)}</option>`; });
        function updateMonth(v) { currentMonth = parseInt(v); render(); }
        function clearAllData() { if(confirm("Resettare l'app?")) { localStorage.clear(); location.reload(); } }

        window.onload = () => render();
    </script>
</body>
</html>
