<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanze Casa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <div id="main-app" class="max-w-md mx-auto p-6">
        <div class="bg-white rounded-3xl shadow-lg p-8 text-center">
            <h1 class="text-2xl font-bold text-indigo-600 mb-4">Finanze Famiglia</h1>
            <div class="text-4xl font-black text-gray-800 mb-6" id="balance">€ 0.00</div>
            
            <div class="space-y-4">
                <input type="number" id="input-amt" placeholder="Importo" class="w-full border p-4 rounded-2xl outline-none bg-gray-50">
                <input type="text" id="input-dsc" placeholder="Descrizione" class="w-full border p-4 rounded-2xl outline-none bg-gray-50">
                <div class="flex gap-2">
                    <button onclick="save(1)" class="flex-1 bg-green-500 text-white p-4 rounded-2xl font-bold">ENTRATA</button>
                    <button onclick="save(0)" class="flex-1 bg-red-500 text-white p-4 rounded-2xl font-bold">USCITA</button>
                </div>
            </div>

            <div id="history" class="mt-8 text-left space-y-2">
                </div>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('f_data')) || [];

        function save(isInc) {
            const a = document.getElementById('input-amt').value;
            const d = document.getElementById('input-dsc').value;
            if(!a || !d) return alert("Inserisci i dati!");

            data.unshift({ amt: parseFloat(a), dsc: d, type: isInc });
            localStorage.setItem('f_data', JSON.stringify(data));
            location.reload(); // Ricarica per aggiornare
        }

        function render() {
            const balEl = document.getElementById('balance');
            const histEl = document.getElementById('history');
            
            let total = 0;
            let html = "";
            
            data.forEach(item => {
                total += item.type ? item.amt : -item.amt;
                html += `
                    <div class="flex justify-between p-2 border-b text-sm">
                        <span>${item.dsc}</span>
                        <span class="font-bold ${item.type ? 'text-green-500' : 'text-red-500'}">
                            ${item.type ? '+' : '-'} €${item.amt.toFixed(2)}
                        </span>
                    </div>
                `;
            });
            
            balEl.innerText = "€ " + total.toFixed(2);
            histEl.innerHTML = html;
        }

        render();
    </script>
</body>
</html>
