<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanze Famiglia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { -webkit-tap-highlight-color: transparent; padding-bottom: 90px; }
        .hidden { display: none; }
        .nav-active { color: #6366f1; transform: scale(1.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="page-dashboard" class="max-w-md mx-auto px-4 pt-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black text-slate-800">Finanze Famiglia</h1>
                <p id="month-label" class="text-indigo-600 font-bold uppercase text-[10px] tracking-widest"></p>
            </div>
            <select id="month-select" onchange="updateMonth(this.value)" class="bg-white p-2 rounded-lg shadow-sm border border-slate-200 text-[10px] font-bold uppercase outline-none"></select>
        </div>

        <div class="bg-indigo-600 rounded-[2rem] p-6 text-white shadow-xl mb-6">
            <h2 id="total-balance" class="text-4xl font-black text-center mb-4">€ 0.00</h2>
            <div class="grid grid-cols-2 gap-4 border-t border-indigo-400/50 pt-4 text-center text-sm">
                <div><p class="text-indigo-200 text-[9px] uppercase">Entrate Mese</p><p id="m-inc" class="font-bold text-emerald-300">€ 0.00</p></div>
                <div><p class="text-indigo-200 text-[9px] uppercase">Uscite Mese</p><p id="m-exp" class="font-bold text-rose-300">€ 0.00</p></div>
            </div>
        </div>

        <div class="mb-6 overflow-x-auto whitespace-nowrap pb-2 no-scrollbar">
            <div id="quick-actions-container" class="flex gap-2"></div>
        </div>

        <div class="bg-white rounded-[2rem] p-6 shadow-md mb-6 space-y-4 border border-slate-100">
            <div class="flex gap-2">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-slate-50 rounded-2xl p-4 font-bold text-lg outline-none focus:ring-2 focus:ring-indigo-500">
                <select id="usr" class="w-1/2 bg-slate-50 rounded-2xl p-4 text-sm font-bold text-indigo-600 outline-none">
                    <option value="Stany">Stany</option>
                    <option value="Giulia">Giulia</option>
                </select>
            </div>
            <input type="text" id="dsc" placeholder="Cosa hai comprato?" class="w-full bg-slate-50 rounded-2xl p-4 outline-none">
            <select id="cat" class="w-full bg-slate-50 rounded-2xl p-4 outline-none text-slate-600 font-medium"></select>
            <div class="flex gap-3">
                <button onclick="save('inc')" class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-emerald-100">+ ENTRATA</button>
                <button onclick="save('exp')" class="flex-1 bg-rose-500 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-rose-100">- USCITA</button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] p-6 shadow-md mb-6 space-y-8">
            <canvas id="chartPie" class="max-h-48 mx-auto"></canvas>
            <canvas id="chartLine" class="max-h-40 mx-auto"></canvas>
        </div>

        <div id="list" class="space-y-3"></div>
    </div>

    <div id="page-settings" class="max-w-md mx-auto px-4 pt-6 hidden">
        <h1 class="text-2xl font-black text-slate-800 mb-6">Impostazioni</h1>
        
        <div class="space-y-6">
            <div class="bg-white rounded-[2rem] p-6 shadow-md">
                <p class="text-[10px] font-bold text-indigo-600 uppercase mb-4 tracking-widest">Importi Ricorrenti</p>
                <div id="settings-quick-list" class="space-y-4 mb-4"></div>
                <button onclick="saveSettings()" class="w-full bg-slate-800 text-white py-3 rounded-xl text-sm font-bold uppercase">Aggiorna Importi</button>
            </div>

            <div class="bg-white rounded-[2rem] p-6 shadow-md">
                <p class="text-[10px] font-bold text-indigo-600 uppercase mb-4 tracking-widest">Gestione Categorie</p>
                <div id="settings-cat-list" class="space-y-2 mb-4"></div>
                <div class="flex gap-2 border-t pt-4">
                    <input type="text" id="new-cat-name" placeholder="Es: 🍎 Cibo" class="flex-1 bg-slate-50 rounded-lg p-2 text-sm outline-none">
                    <button onclick="addCategory()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold">+</button>
                </div>
            </div>

            <button onclick="resetData()" class="w-full text-rose-300 text-[10px] font-bold uppercase py-4">Reset Totale Dati</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-200 h-20 flex items-center justify-around z-50">
        <button onclick="showPage('dashboard')" id="btn-dash" class="flex flex-col items-center gap-1 nav-active transition-all">
            <span class="text-2xl">📊</span>
            <span class="text-[10px] font-bold uppercase">App</span>
        </button>
        <button onclick="showPage('settings')" id="btn-set" class="flex flex-col items-center gap-1 text-slate-400 transition-all">
            <span class="text-2xl">⚙️</span>
            <span class="text-[10px] font-bold uppercase">Set</span>
        </button>
    </nav>

    <script>
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        let transactions = JSON.parse(localStorage.getItem('family_v6')) || [];
        
        let quickSettings = JSON.parse(localStorage.getItem('quick_v6')) || [
            { label: '🏠 Pagamento Casa', amt: 600, type: 'exp' },
            { label: '🌐 Fibra casa', amt: 30, type: 'exp' },
            { label: '💰 Stipendio Stany', amt: 1800, type: 'inc' }
        ];

        let categories = JSON.parse(localStorage.getItem('cats_v6')) || [
            "🏠 Casa", "🛒 Spesa", "👶 Riccardo", "🍕 Tortellini", "🚗 Mezzi", "💰 Lavoro", "📱 Varie"
        ];

        let currentMonth = new Date().getMonth();
        let pieChart = null, lineChart = null;

        function showPage(page) {
            document.getElementById('page-dashboard').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('page-settings').classList.toggle('hidden', page !== 'settings');
            document.getElementById('btn-dash').classList.toggle('nav-active', page === 'dashboard');
            document.getElementById('btn-set').classList.toggle('nav-active', page === 'settings');
            if(page === 'dashboard') render();
            if(page === 'settings') renderSettings();
        }

        // --- GESTIONE CATEGORIE ---
        function renderSettings() {
            // Tasti Rapidi
            const qList = document.getElementById('settings-quick-list');
            qList.innerHTML = quickSettings.map((s, i) => `
                <div class="flex justify-between items-center gap-4">
                    <span class="text-xs font-bold text-slate-600 w-1/2">${s.label}</span>
                    <input type="number" id="set-amt-${i}" value="${s.amt}" class="w-1/2 bg-slate-50 rounded-lg p-
