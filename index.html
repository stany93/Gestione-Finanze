<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanze Famiglia</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; padding-bottom: 120px; background: #f8fafc; }
        .hidden { display: none !important; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .nav-active { color: #6366f1; transform: scale(1.05); font-weight: 800; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes flash-inc { 0% { background: #f0fdf4; } 100% { background: white; } }
        @keyframes flash-exp { 0% { background: #fef2f2; } 100% { background: white; } }
        .flash-inc { animation: flash-inc 0.8s ease-out; }
        .flash-exp { animation: flash-exp 0.8s ease-out; }
    </style>
</head>
<body class="min-h-screen">

    <div id="page-dashboard" class="max-w-md mx-auto px-5 pt-12">
        
        <div class="flex justify-between items-start mb-8 text-left">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight italic text-left">Wallet</h1>
                <p id="date-label" class="text-indigo-500 font-bold text-[10px] uppercase mt-1 tracking-widest text-left"></p>
            </div>
            <div class="flex gap-2">
                <select id="month-select" onchange="updateDateFilter()" class="glass-card px-2 py-2 rounded-xl text-[10px] font-black uppercase outline-none text-slate-500 cursor-pointer"></select>
                <select id="year-select" onchange="updateDateFilter()" class="glass-card px-2 py-2 rounded-xl text-[10px] font-black uppercase outline-none text-slate-500 cursor-pointer"></select>
            </div>
        </div>

        <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl mb-8 relative overflow-hidden text-center">
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2 italic">Patrimonio</p>
            <div class="flex justify-center items-end gap-3 mb-6">
                <h2 id="total-balance" class="text-4xl font-extrabold tracking-tighter italic">€ 0,00</h2>
                <div class="w-12 h-6"><canvas id="sparklineChart"></canvas></div>
            </div>
            <div class="flex justify-around items-center gap-4 bg-white/5 p-4 rounded-3xl backdrop-blur-md">
                <div class="text-center">
                    <p class="text-slate-500 text-[9px] uppercase font-bold mb-1 tracking-widest">Entrate</p>
                    <p id="m-inc" class="font-extrabold text-emerald-400 text-base">€ 0</p>
                </div>
                <div class="text-center">
                    <p class="text-slate-500 text-[9px] uppercase font-bold mb-1 tracking-widest">Uscite</p>
                    <p id="m-exp" class="font-extrabold text-rose-400 text-base">€ 0</p>
                </div>
            </div>
        </div>

        <div class="mb-8 overflow-x-auto whitespace-nowrap pb-2 no-scrollbar scroll-smooth">
            <div id="quick-actions-container" class="flex gap-3"></div>
        </div>

        <div id="input-card" class="glass-card rounded-[2.5rem] p-6 shadow-xl mb-8 space-y-4 border border-white relative transition-all">
            <div id="ai-badge" class="hidden absolute top-4 right-6 text-[8px] font-black bg-indigo-600 text-white px-2 py-1 rounded-md uppercase tracking-tighter">AI</div>
            <div class="flex gap-2">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-slate-100/50 rounded-2xl p-4 font-extrabold text-xl outline-none">
                <select id="usr" class="w-1/2 bg-slate-100/50 rounded-2xl p-4 text-xs font-bold text-indigo-600 outline-none">
                    <option value="Stany">Stany</option>
                    <option value="Giulia">Giulia</option>
                </select>
            </div>
            <input type="text" id="dsc" oninput="predictCategory(this.value)" placeholder="Cosa hai comprato?" class="w-full bg-slate-100/50 rounded-2xl p-4 text-sm outline-none font-medium text-left">
            <select id="cat" class="w-full bg-slate-100/50 rounded-2xl p-4 text-sm outline-none font-bold text-slate-600 appearance-none text-left"></select>
            <div class="flex gap-3 pt-2">
                <button onclick="save('inc')" class="flex-1 bg-slate-900 text-emerald-400 py-4 rounded-2xl font-extrabold text-[10px] uppercase tracking-widest active:scale-95 transition-transform">+ Ricevuto</button>
                <button onclick="save('exp')" class="flex-1 bg-slate-900 text-rose-400 py-4 rounded-2xl font-extrabold text-[10px] uppercase tracking-widest active:scale-95 transition-transform">- Speso</button>
            </div>
        </div>

        <div id="charts-container" class="glass-card rounded-[2.5rem] p-7 mb-10 space-y-10 shadow-sm border border-white">
            <canvas id="chartPie" class="max-h-48 mx-auto"></canvas>
            <div class="pt-8 border-t border-slate-100"><canvas id="chartLine" class="max-h-40 mx-auto"></canvas></div>
        </div>
        
        <div id="list" class="space-y-4 pb-20 text-left"></div>
    </div>

    <div id="page-settings" class="max-w-md mx-auto px-6 pt-12 hidden text-center text-left">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-10 tracking-tight italic">Opzioni</h1>
        <div class="space-y-8 pb-10 text-left">
            
            <div class="glass-card rounded-[2.5rem] p-6 shadow-sm border border-white">
                <p class="text-[10px] font-black text-indigo-500 uppercase mb-6 tracking-widest text-center">Tasti Rapidi</p>
                <div id="settings-quick-list" class="space-y-3 mb-6"></div>
                <div class="bg-slate-100/50 p-4 rounded-3xl space-y-3 text-sm">
                    <input type="text" id="new-q-label" placeholder="Nome" class="w-full p-3 rounded-xl outline-none text-left">
                    <div class="flex gap-2">
                        <input type="number" id="new-q-amt" placeholder="€" class="w-1/2 p-3 rounded-xl font-bold outline-none text-left">
                        <select id="new-q-type" class="w-1/2 p-3 rounded-xl font-bold outline-none"><option value="exp">Uscita</option><option value="inc">Entrata</option></select>
                    </div>
                    <button onclick="addQuickSetting()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold uppercase text-[10px] shadow-lg">+ Aggiungi</button>
                </div>
            </div>

            <button onclick="clearAllData()" class="w-full text-rose-300 text-[10px] font-black uppercase py-10 opacity-40 italic tracking-widest text-center">Reset Dati Dispositivo</button>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 bg-slate-900 h-20 rounded-[2rem] flex items-center justify-around z-50 shadow-2xl border border-white/10">
        <button onclick="switchTab('dashboard')" id="btn-dash" class="flex flex-col items-center gap-1 nav-active transition-all text-left">
            <span class="text-xl">📊</span><span class="text-[8px] uppercase font-black tracking-widest">Home</span>
        </button>
        <button onclick="switchTab('settings')" id="btn-set" class="flex flex-col items-center gap-1 text-slate-500 transition-all text-left">
            <span class="text-xl">⚙️</span><span class="text-[8px] uppercase font-black tracking-widest">Set</span>
        </button>
    </nav>

    <script>
        // ==========================================
        // 1. COSTANTI E CONFIGURAZIONE INIZIALE
        // ==========================================
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const catColors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6'];
        
        // Motore Semantico (Identico alla v22.1)
        const brain = {
            'Spesa': ['esselunga', 'conad', 'coop', 'lidl', 'macellaio', 'verdura', 'frutta', 'pane', 'supermercato', 'cibo', 'spesa'],
            'Casa': ['affitto', 'bolletta', 'luce', 'gas', 'acqua', 'fibra', 'wifi', 'internet', 'condominio', 'tari', 'enel', 'casa'],
            'Riccardo': ['pannolini', 'nido', 'pappa', 'latte', 'giochi', 'asilo', 'biberon', 'riccardo'],
            'Svago': ['pizza', 'ristorante', 'cena', 'birra', 'aperitivo', 'bar', 'caffè', 'cinema', 'svago'],
            'Mezzi': ['benzina', 'diesel', 'treno', 'bus', 'parcheggio', 'tper', 'auto', 'mezzi'],
            'Lavoro': ['stipendio', 'bonus', 'rimborso', 'lavoro']
        };

        // ==========================================
        // 2. GESTIONE SICURA DEI DATI (LOCAL STORAGE)
        // ==========================================
        let transactions = [];
        let quickSettings = [];
        let categories = [];
        
        try {
            const tData = localStorage.getItem('fin_v22_trans');
            if (tData) transactions = JSON.parse(tData);
            // Verifica base che sia un array per evitare blocchi
            if (!Array.isArray(transactions)) transactions = []; 
        } catch (e) { console.error("Errore recupero transazioni"); }

        try {
            const qData = localStorage.getItem('fin_v22_quick');
            quickSettings = qData ? JSON.parse(qData) : [
                { label: 'Casa', amt: 600, type: 'exp' }, 
                { label: 'Fibra', amt: 30, type: 'exp' }, 
                { label: 'Stipendio', amt: 1800, type: 'inc' }
            ];
        } catch (e) { console.error("Errore recupero tasti rapidi"); }

        try {
            const cData = localStorage.getItem('fin_v22_cats');
            categories = cData ? JSON.parse(cData) : ["Casa", "Spesa", "Riccardo", "Svago", "Lavoro", "Mezzi"];
        } catch (e) { console.error("Errore recupero categorie"); }

        // Variabili di stato globali
        const now = new Date();
        let currentMonth = now.getMonth();
        let currentYear = now.getFullYear();
        let charts = { pie: null, line: null, spark: null };

        // Helper Feedback Tattile
        function vibrate() { 
            try { if (window.navigator?.vibrate) window.navigator.vibrate(30); } catch(e) {} 
        }


        // ==========================================
        // 3. LOGICA DI BUSINESS E INTERFACCIA
        // ==========================================
        
        function predictCategory(text) {
            try {
                const val = text.toLowerCase();
                const badge = document.getElementById('ai-badge');
                const select = document.getElementById('cat');
                let found = false;
                
                for (let catName in brain) {
                    if (brain[catName].some(k => val.includes(k)) && categories.includes(catName)) {
                        select.value = catName; 
                        found = true; 
                        break;
                    }
                }
                if (badge) badge.classList.toggle('hidden', !found);
            } catch (e) { console.error("Errore predizione",
