<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanze Famiglia v1.0</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; padding-bottom: 120px; background: #f8fafc; }
        .hidden { display: none !important; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .nav-active { color: #6366f1; transform: scale(1.05); font-weight: 800; filter: drop-shadow(0 0 6px rgba(99, 102, 241, 0.3)); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes flash-inc { 0% { background: #dcfce7; transform: scale(1.02); } 100% { background: rgba(255, 255, 255, 0.85); transform: scale(1); } }
        @keyframes flash-exp { 0% { background: #fee2e2; transform: scale(1.02); } 100% { background: rgba(255, 255, 255, 0.85); transform: scale(1); } }
        .flash-inc { animation: flash-inc 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .flash-exp { animation: flash-exp 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <div id="page-dashboard" class="max-w-md mx-auto px-5 pt-12">
        
        <div class="flex justify-between items-start mb-8 text-left">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight italic">Wallet</h1>
                <p id="date-label" class="text-indigo-500 font-bold text-[10px] uppercase mt-1 tracking-widest"></p>
            </div>
            <div class="flex gap-2">
                <select id="month-select" onchange="updateDateFilter()" class="glass-card px-3 py-2 rounded-xl text-[10px] font-black uppercase outline-none text-slate-600 cursor-pointer shadow-sm"></select>
                <select id="year-select" onchange="updateDateFilter()" class="glass-card px-3 py-2 rounded-xl text-[10px] font-black uppercase outline-none text-slate-600 cursor-pointer shadow-sm"></select>
            </div>
        </div>

        <div class="bg-gradient-to-br from-slate-800 via-slate-900 to-slate-950 rounded-[2.5rem] p-8 text-white shadow-[0_20px_40px_-15px_rgba(99,102,241,0.4)] mb-10 relative overflow-hidden text-center border border-slate-700/50">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl pointer-events-none"></div>
            
            <p class="text-indigo-200/80 text-[10px] font-bold uppercase tracking-widest mb-2 italic relative z-10">Patrimonio Corrente</p>
            <div class="flex justify-center items-end gap-3 mb-8 relative z-10">
                <h2 id="total-balance" class="text-[2.75rem] leading-none font-extrabold tracking-tighter italic text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-300 drop-shadow-sm">€ 0,00</h2>
            </div>
            
            <div class="flex justify-around items-center gap-4 bg-white/10 p-4 rounded-[1.5rem] backdrop-blur-md border border-white/10 shadow-inner relative z-10">
                <div class="text-center w-1/2 border-r border-white/10">
                    <p class="text-slate-400 text-[9px] uppercase font-bold mb-1 tracking-widest">Entrate</p>
                    <p id="m-inc" class="font-extrabold text-emerald-400 text-base drop-shadow-[0_0_8px_rgba(52,211,153,0.3)]">€ 0</p>
                </div>
                <div class="text-center w-1/2">
                    <p class="text-slate-400 text-[9px] uppercase font-bold mb-1 tracking-widest">Uscite</p>
                    <p id="m-exp" class="font-extrabold text-rose-400 text-base drop-shadow-[0_0_8px_rgba(251,113,133,0.3)]">€ 0</p>
                </div>
            </div>
        </div>

        <div class="mb-10 overflow-x-auto whitespace-nowrap pb-4 no-scrollbar scroll-smooth"><div id="quick-actions-container" class="flex gap-3 px-1"></div></div>

        <div id="input-card" class="glass-card rounded-[2.5rem] p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] mb-10 space-y-4 relative transition-all">
            <div id="ai-badge" class="hidden absolute top-4 right-6 text-[8px] font-black bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-2 py-1 rounded-md uppercase tracking-tighter shadow-md">AI Suggerita</div>
            <div class="flex gap-3">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-white/80 rounded-2xl p-4 font-extrabold text-2xl outline-none border border-slate-100 shadow-inner text-slate-800 placeholder-slate-300">
                <select id="usr" class="w-1/2 bg-white/80 rounded-2xl p-4 text-xs font-bold text-indigo-600 outline-none border border-slate-100 shadow-inner appearance-none">
                    <option value="Stany">🙋‍♂️ Stany</option>
                    <option value="Giulia">🙋‍♀️ Giulia</option>
                </select>
            </div>
            <input type="text" id="dsc" oninput="predictCategory(this.value)" placeholder="Cosa hai comprato?" class="w-full bg-white/80 rounded-2xl p-4 text-sm outline-none font-semibold text-left border border-slate-100 shadow-inner text-slate-700 placeholder-slate-400">
            <select id="cat" class="w-full bg-white/80 rounded-2xl p-4 text-sm outline-none font-bold text-slate-600 appearance-none text-left border border-slate-100 shadow-inner"></select>
            
            <div class="flex gap-3 pt-3">
                <button onclick="save('inc')" class="flex-1 bg-gradient-to-tr from-emerald-500 to-emerald-400 text-white py-4 rounded-[1.25rem] font-extrabold text-[11px] uppercase tracking-widest active:scale-95 transition-all shadow-[0_8px_20px_-6px_rgba(16,185,129,0.5)]">+ Ricevuto</button>
                <button onclick="save('exp')" class="flex-1 bg-gradient-to-tr from-rose-500 to-rose-400 text-white py-4 rounded-[1.25rem] font-extrabold text-[11px] uppercase tracking-widest active:scale-95 transition-all shadow-[0_8px_20px_-6px_rgba(244,63,94,0.5)]">- Speso</button>
            </div>
        </div>

        <div id="charts-container" class="glass-card rounded-[2.5rem] p-7 mb-10 space-y-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
            <p class="text-slate-400 font-bold text-[9px] uppercase tracking-widest text-center">Spese per Categoria</p>
            <canvas id="chartPie" class="max-h-48 mx-auto"></canvas>
            <div class="pt-8 border-t border-slate-100"><canvas id="chartLine" class="max-h-40 mx-auto"></canvas></div>
        </div>
        
        <div id="list" class="space-y-3 pb-24 text-left"></div>
    </div>

    <div id="page-settings" class="max-w-md mx-auto px-6 pt-12 hidden text-center text-left">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-10 tracking-tight italic">Opzioni</h1>
        <div class="space-y-8 pb-24 text-left">
            <div class="glass-card rounded-[2.5rem] p-6 shadow-sm border border-white">
                <p class="text-[10px] font-black text-indigo-500 uppercase mb-6 tracking-widest text-center">Tasti Rapidi</p>
                <div id="settings-quick-list" class="space-y-3 mb-6"></div>
                <div class="bg-white/60 p-4 rounded-3xl space-y-3 text-sm shadow-inner border border-slate-100">
                    <input type="text" id="new-q-label" placeholder="Etichetta" class="w-full p-3 rounded-xl outline-none border-none text-left bg-white">
                    <div class="flex gap-2">
                        <input type="number" id="new-q-amt" placeholder="€" class="w-1/2 p-3 rounded-xl font-bold outline-none border-none text-left bg-white">
                        <select id="new-q-type" class="w-1/2 p-3 rounded-xl font-bold outline-none border-none bg-white"><option value="exp">Uscita</option><option value="inc">Entrata</option></select>
                    </div>
                    <button onclick="addQuickSetting()" class="w-full bg-slate-800 text-white py-3.5 rounded-xl font-bold uppercase text-[10px] shadow-md">+ Crea Tasto</button>
                </div>
            </div>
            
            <div class="glass-card rounded-[2.5rem] p-6 shadow-sm border border-white text-center">
                <p class="text-[10px] font-black text-indigo-500 uppercase mb-6 tracking-widest text-center">Gestione Categorie</p>
                <div id="settings-cat-list" class="space-y-2 mb-6 text-xs font-bold uppercase text-slate-600"></div>
                <div class="flex gap-2 p-2 bg-white/60 rounded-2xl shadow-inner border border-slate-100">
                    <input type="text" id="new-cat-name" placeholder="Nuova..." class="flex-1 bg-transparent px-3 outline-none text-sm font-medium border-none text-left">
                    <button onclick="addCategory()" class="bg-indigo-500 text-white px-5 py-3 rounded-xl font-bold shadow-md shadow-indigo-500/30">+</button>
                </div>
            </div>

            <button onclick="clearAllData()" class="w-full text-rose-400 bg-rose-50/50 rounded-3xl text-[10px] font-black uppercase py-6 border border-rose-100 tracking-widest text-center active:scale-95 transition-transform">Reset Dati App</button>
        </div>
    </div>

    <nav class="fixed bottom-5 left-5 right-5 bg-slate-900/90 backdrop-blur-xl h-20 rounded-[2.5rem] flex items-center justify-around z-50 shadow-[0_20px_40px_rgba(0,0,0,0.3)] border border-slate-700/50">
        <button onclick="switchTab('dashboard')" id="btn-dash" class="flex flex-col items-center gap-1 nav-active transition-all text-left">
            <span class="text-[22px]">📊</span><span class="text-[8px] uppercase font-black tracking-widest">Home</span>
        </button>
        <button onclick="switchTab('settings')" id="btn-set" class="flex flex-col items-center gap-1 text-slate-500 transition-all text-left">
            <span class="text-[22px]">⚙️</span><span class="text-[8px] uppercase font-black tracking-widest">Opzioni</span>
        </button>
    </nav>

    <script>
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const catColors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#06b6d4', '#f97316', '#84cc16', '#3b82f6', '#d946ef', '#14b8a6'];
        
        const brain = {
            'Casa': ['affitto', 'bolletta', 'luce', 'gas', 'acqua', 'fibra', 'wifi', 'internet', 'condominio', 'tari', 'enel', 'ikea', 'leroy', 'casa', 'mutuo'],
            'Spesa': ['esselunga', 'conad', 'coop', 'lidl', 'macellaio', 'verdura', 'frutta', 'pane', 'forno', 'supermercato', 'carne', 'pesce', 'cibo', 'spesa', 'iper', 'eurospin'],
            'Riccardo': ['pannolini', 'nido', 'pappa', 'latte', 'giochi', 'asilo', 'biberon', 'scuola', 'riccardo', 'pediatra', 'vestiti bimbo', 'giocattoli', 'bambino'],
            'Svago': ['cinema', 'svago', 'pub', 'tabacco', 'aperitivo', 'bar', 'caffè', 'birra', 'concerto', 'discoteca', 'drink', 'serata', 'film'],
            'Lavoro': ['stipendio', 'bonus', 'rimborso', 'lavoro', 'fattura', 'cliente', 'busta paga'],
            'Gatti': ['gatto', 'gatti', 'croccantini', 'sabbietta', 'veterinario', 'cibo gatti', 'lettiera', 'cibo umido', 'scatolette', 'antiparassitario'],
            'Macchina': ['benzina', 'diesel', 'parcheggio', 'autostrada', 'meccanico', 'bollo', 'assicurazione', 'macchina', 'auto', 'telepass', 'carburante', 'lavaggio', 'gommista', 'casello'],
            'Cene': ['pizza', 'ristorante', 'cena', 'cene', 'sushi', 'mcdonald', 'burger', 'kebab', 'pranzo', 'osteria', 'trattoria', 'glovo', 'deliveroo', 'justeat', 'pizzeria'],
            'Vestiti': ['vestiti', 'scarpe', 'maglia', 'pantaloni', 'abbigliamento', 'zalando', 'zara', 'h&m', 'shopping', 'felpa', 'giubbotto', 'calze', 'intimo', 'vestito'],
            'Vacanze': ['vacanza', 'vacanze', 'hotel', 'volo', 'aereo', 'treno', 'bnb', 'booking', 'viaggio', 'ryanair', 'airbnb', 'traghetto', 'autobus', 'biglietto', 'frecciarossa'],
            'Regali': ['regalo', 'regali', 'compleanno', 'anniversario', 'natale', 'festa', 'pensiero', 'dono'],
            'Salute': ['farmacia', 'medico', 'dentista', 'visita', 'analisi', 'salute', 'farmaco', 'medicine', 'ticket', 'terapia', 'dottore', 'ospedale']
        };

        // Identico alla v22.1 - il "motore"
        let transactions = JSON.parse(localStorage.getItem('fin_v22_trans')) || [];
        let quickSettings = JSON.parse(localStorage.getItem('fin_v22_quick')) || [{ label: 'Casa', amt: 600, type: 'exp' }, { label: 'Fibra', amt: 30, type: 'exp' }, { label: 'Stipendio', amt: 1800, type: 'inc' }];
        
        // Uso una chiave nuova così si auto-popola la prima volta con le 12 categorie senza codice complesso
        let categories = JSON.parse(localStorage.getItem('fin_v1_cats')) || ["Casa", "Spesa", "Riccardo", "Svago", "Lavoro", "Gatti", "Macchina", "Cene", "Vestiti", "Vacanze", "Regali", "Salute"];
        
        const now = new Date();
        let currentMonth = now.getMonth();
        let currentYear = now.getFullYear();
        let charts = { pie: null, line: null, spark: null };

        function vibrate() { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(30); }

        function predictCategory(text) {
            const val = text.toLowerCase();
            const badge = document.getElementById('ai-badge');
            const select = document.getElementById('cat');
            let found = false;
            for (let catName in brain) {
                if (brain[catName].some(k => val.includes(k)) && categories.includes(catName)) {
                    select.value = catName; found = true; break;
                }
            }
            if (badge) {
                if (found) badge.classList.remove('hidden');
                else badge.classList.add('hidden');
            }
        }

        function switchTab(p) {
            vibrate();
            document.getElementById('page-dashboard').classList.toggle('hidden', p !== 'dashboard');
            document.getElementById('page-settings').classList.toggle('hidden', p !== 'settings');
            
            const btnDash = document.getElementById('btn-dash');
            const btnSet = document.getElementById('btn-set');
            
            if(p === 'dashboard') {
                btnDash.classList.add('nav-active'); btnDash.classList.remove('text-slate-500');
                btnSet.classList.remove('nav-active'); btnSet.classList.add('text-slate-500');
                render();
            } else {
                btnSet.classList.add('nav-active'); btnSet.classList.remove('text-slate-500');
                btnDash.classList.remove('nav-active'); btnDash.classList.add('text-slate-500');
                renderSettingsPage();
            }
        }

        function renderSettingsPage() {
            document.getElementById('settings-quick-list').innerHTML = quickSettings.map((s, i) => `<div class="flex items-center gap-3 bg-white p-3 rounded-2xl border border-slate-100 text-[10px] font-bold uppercase shadow-sm"><div class="flex-1 text-slate-700">${s.label} <span class="text-indigo-500 ml-1">€${s.amt}</span></div><button onclick="removeQuickSetting(${i})" class="text-rose-400 font-bold px-3 py-1 bg-rose-50 rounded-lg">✕</button></div>`).join('');
            document.getElementById('settings-cat-list').innerHTML = categories.map((c, i) => `<div class="flex justify-between items-center bg-white p-3 rounded-2xl mb-2 italic px-4 shadow-sm border border-slate-100"><span class="font-semibold text-slate-700">${c}</span><button onclick="removeCategory(${i})" class="text-rose-400 font-bold px-2 py-1">✕</button></div>`).join('');
        }

        function updateDateFilter() {
            currentMonth = parseInt(document.getElementById('month-select').value);
            currentYear = parseInt(document.getElementById('year-select').value);
            render();
        }

        function render() {
            const catSelect = document.getElementById('cat');
            const catVal = catSelect.value;
            catSelect.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            if (categories.includes(catVal)) catSelect.value = catVal;

            document.getElementById('quick-actions-container').innerHTML = quickSettings.map(s => `<button onclick="addQuick('${s.label}', ${s.amt}, '${s.type}')" class="glass-card px-6 py-4 rounded-[1.5rem] shadow-sm hover:shadow-md shrink-0 active:scale-95 transition-all text-center border-white/80 bg-gradient-to-br from-white to-slate-50/80"><p class="text-[9px] font-black uppercase text-indigo-500 mb-1 tracking-tighter">${s.label}</p><p class="text-[15px] font-extrabold text-slate-800 tracking-tighter italic">€${s.amt}</p></button>`).join('');

            const filtered = transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });

            const total = transactions.reduce((s, t) => t.type === 'inc' ? s + t.amt : s - t.amt, 0);
            const mInc = filtered.filter(t => t.type === 'inc').reduce((s, t) => s + t.amt, 0);
            const mExp = filtered.filter(t => t.type === 'exp').reduce((s, t) => s + t.amt, 0);

            document.getElementById('date-label').innerText = `${monthNames[currentMonth]} ${currentYear}`;
            document.getElementById('total-balance').innerText = `€ ${total.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('m-inc').innerText = `+ €${mInc.toFixed(0)}`;
            document.getElementById('m-exp').innerText = `- €${mExp.toFixed(0)}`;

            document.getElementById('list').innerHTML = filtered.map(t => `<div class="glass-card p-4 rounded-[1.5rem] flex justify-between items-center border border-white shadow-sm hover:shadow-md transition-all mb-3 text-sm pr-5 bg-gradient-to-br from-white to-slate-50/50"><div class="truncate flex-1 pr-4 text-left"><p class="font-extrabold text-slate-800 truncate tracking-tight italic">${t.dsc}</p><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic mt-0.5">${t.usr} • ${t.cat}</p></div><div class="flex items-center gap-3 text-right"><p class="font-black ${t.type === 'inc' ? 'text-emerald-500' : 'text-rose-500'} text-base italic">€${t.amt.toFixed(2)}</p><button onclick="deleteEntry(${t.id})" class="text-slate-300 hover:text-rose-400 transition-colors font-bold pl-2 pr-1 py-1 text-lg">✕</button></div></div>`).join('');
            
            setTimeout(() => { try { updateCharts(filtered); } catch(e) {} }, 150);
        }

        function addQuickSetting() {
