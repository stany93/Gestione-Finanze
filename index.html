<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanze Famiglia</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; padding-bottom: 120px; background: #f8fafc; }
        .hidden { display: none !important; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .nav-active { color: #6366f1; transform: scale(1.1); font-weight: 800; }
        .cat-icon-pro { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
        @keyframes flash-green { 0% { background: #f0fdf4; border-color: #10b981; } 100% { background: white; border-color: white; } }
        @keyframes flash-red { 0% { background: #fef2f2; border-color: #ef4444; } 100% { background: white; border-color: white; } }
        .flash-inc { animation: flash-green 1.2s ease-out; }
        .flash-exp { animation: flash-red 1.2s ease-out; }
        .ai-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="min-h-screen">

    <div id="page-dashboard" class="max-w-md mx-auto px-5 pt-12">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight leading-none">Wallet</h1>
                <p id="month-label" class="text-indigo-500 font-bold text-[11px] uppercase tracking-[0.2em] mt-2"></p>
            </div>
            <select id="month-select" onchange="updateMonth(this.value)" class="glass-card px-3 py-2 rounded-xl text-[10px] font-black uppercase outline-none text-slate-500"></select>
        </div>

        <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl mb-10 relative overflow-hidden">
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mb-2 text-center">Patrimonio Totale</p>
            <div class="flex justify-center items-end gap-4 mb-8">
                <h2 id="total-balance" class="text-4xl font-extrabold tracking-tighter italic">€ 0.00</h2>
                <div class="w-16 h-8"><canvas id="sparklineChart"></canvas></div>
            </div>
            <div class="flex justify-around items-center gap-4 bg-white/5 p-4 rounded-3xl backdrop-blur-md border border-white/5">
                <div class="text-center">
                    <p class="text-slate-500 text-[9px] uppercase font-bold mb-1 tracking-widest">Entrate</p>
                    <p id="m-inc" class="font-extrabold text-emerald-400 text-base">€ 0</p>
                </div>
                <div class="w-[1px] h-6 bg-slate-700"></div>
                <div class="text-center">
                    <p class="text-slate-500 text-[9px] uppercase font-bold mb-1 tracking-widest">Uscite</p>
                    <p id="m-exp" class="font-extrabold text-rose-400 text-base">€ 0</p>
                </div>
            </div>
        </div>

        <div class="mb-10 overflow-x-auto whitespace-nowrap pb-2 no-scrollbar"><div id="quick-actions-container" class="flex gap-3"></div></div>

        <div id="input-card" class="glass-card rounded-[2.5rem] p-6 shadow-xl mb-10 space-y-4 border border-white transition-all relative">
            <div id="ai-badge" class="hidden absolute top-4 right-6 text-[8px] font-black bg-indigo-100 text-indigo-600 px-2 py-1 rounded-md uppercase ai-badge tracking-widest">Suggerita</div>
            
            <div class="flex gap-2">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-slate-100/50 rounded-2xl p-4 font-extrabold text-xl outline-none">
                <select id="usr" class="w-1/2 bg-slate-100/50 rounded-2xl p-4 text-xs font-bold text-indigo-600 outline-none">
                    <option value="Stany">Stany</option>
                    <option value="Giulia">Giulia</option>
                </select>
            </div>
            <input type="text" id="dsc" oninput="predictCategory(this.value)" placeholder="Cosa hai pagato?" class="w-full bg-slate-100/50 rounded-2xl p-4 text-sm outline-none font-medium">
            <div class="relative">
                <select id="cat" class="w-full bg-slate-100/50 rounded-2xl p-4 text-sm outline-none font-bold text-slate-600 appearance-none"></select>
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="save('inc')" class="flex-1 bg-slate-900 text-emerald-400 py-4 rounded-2xl font-extrabold text-[10px] uppercase tracking-widest">+ Ricevuto</button>
                <button onclick="save('exp')" class="flex-1 bg-slate-900 text-rose-400 py-4 rounded-2xl font-extrabold text-[10px] uppercase tracking-widest">- Speso</button>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-7 mb-10 space-y-10 shadow-sm border border-white">
            <canvas id="chartPie" class="max-h-48 mx-auto"></canvas>
            <div class="pt-8 border-t border-slate-100"><canvas id="chartLine" class="max-h-40 mx-auto"></canvas></div>
        </div>
        <div id="list" class="space-y-4 pb-20"></div>
    </div>

    <div id="page-settings" class="max-w-md mx-auto px-6 pt-12 hidden">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-10 tracking-tight text-center italic">Opzioni</h1>
        <div class="space-y-8 pb-10">
            <div class="glass-card rounded-[2.5rem] p-6 shadow-sm border border-white">
                <p class="text-[10px] font-black text-indigo-500 uppercase mb-6 tracking-widest text-center">Tasti Rapidi</p>
                <div id="settings-quick-list" class="space-y-3 mb-6"></div>
                <div class="bg-slate-100/50 p-4 rounded-3xl space-y-3">
                    <input type="text" id="new-q-label" placeholder="Nome Tasto" class="w-full p-3 bg-white rounded-xl text-sm outline-none">
                    <div class="flex gap-2">
                        <input type="number" id="new-q-amt" placeholder="€" class="w-1/2 p-3 bg-white rounded-xl text-sm outline-none font-bold">
                        <select id="new-q-type" class="w-1/2 p-3 bg-white rounded-xl text-sm font-bold"><option value="exp">Uscita</option><option value="inc">Entrata</option></select>
                    </div>
                    <button onclick="addQuickSetting()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-xs uppercase tracking-widest">+ Aggiungi</button>
                </div>
            </div>
            <div class="glass-card rounded-[2.5rem] p-6 shadow-sm border border-white">
                <p class="text-[10px] font-black text-indigo-500 uppercase mb-6 tracking-widest text-center">Categorie</p>
                <div id="settings-cat-list" class="space-y-2 mb-6"></div>
                <div class="flex gap-2"><input type="text" id="new-cat-name" placeholder="Nuova..." class="flex-1 bg-slate-100/50 rounded-xl p-3 text-sm outline-none font-medium"><button onclick="addCategory()" class="bg-slate-800 text-white px-5 rounded-xl font-bold">+</button></div>
            </div>
            <button onclick="clearAllData()" class="w-full text-rose-300 text-[10px] font-black uppercase py-10 opacity-40 tracking-[0.3em]">Resetta Dispositivo</button>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 bg-slate-900 h-20 rounded-[2rem] flex items-center justify-around z-50 shadow-2xl border border-white/10">
        <button onclick="switchTab('dashboard')" id="btn-dash" class="flex flex-col items-center gap-1 nav-active transition-all"><span class="text-xl">📊</span><span class="text-[8px] uppercase font-black tracking-widest">Home</span></button>
        <button onclick="switchTab('settings')" id="btn-set" class="flex flex-col items-center gap-1 text-slate-500 transition-all"><span class="text-xl">⚙️</span><span class="text-[8px] uppercase font-black tracking-widest">Set</span></button>
    </nav>

    <script>
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const catColors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#06b6d4'];
        
        // Mappa Intelligente per Auto-Categoria
        const keywordsMap = { 
            'spesa': 'Spesa', 'esselunga': 'Spesa', 'conad': 'Spesa', 'coop': 'Spesa', 'lidl': 'Spesa', 'carrefour': 'Spesa',
            'affitto': 'Casa', 'bolletta': 'Casa', 'fibra': 'Casa', 'enel': 'Casa', 'luce': 'Casa', 'gas': 'Casa',
            'stipendio': 'Lavoro', 'bonus': 'Lavoro', 'lavoro': 'Lavoro',
            'pizza': 'Svago', 'cena': 'Svago', 'ristorante': 'Svago', 'aperitivo': 'Svago', 'bar': 'Svago',
            'pannolini': 'Riccardo', 'nido': 'Riccardo', 'asilo': 'Riccardo', 'giochi': 'Riccardo',
            'benzina': 'Mezzi', 'diesel': 'Mezzi', 'treno': 'Mezzi', 'autobus': 'Mezzi', 'parcheggio': 'Mezzi'
        };

        let transactions = JSON.parse(localStorage.getItem('fin_v16_trans')) || [];
        let quickSettings = JSON.parse(localStorage.getItem('fin_v16_quick')) || [
            { label: 'Casa', amt: 600, type: 'exp' },
            { label: 'Fibra', amt: 30, type: 'exp' },
            { label: 'Stipendio', amt: 1800, type: 'inc' }
        ];
        let categories = JSON.parse(localStorage.getItem('fin_v16_cats')) || ["Casa", "Spesa", "Riccardo", "Svago", "Lavoro", "Mezzi"];
        let currentMonth = new Date().getMonth();
        let pieChart = null, lineChart = null, sparkline = null;

        function vibrate() { if (window.navigator?.vibrate) window.navigator.vibrate(30); }

        function predictCategory(text) {
            const input = text.toLowerCase();
            const badge = document.getElementById('ai-badge');
            const select = document.getElementById('cat');
            let found = false;

            // Cerca nelle parole chiave
            for (let key in keywordsMap) {
                if (input.includes(key)) {
                    const target = keywordsMap[key];
                    if (categories.includes(target)) {
                        select.value = target;
                        found = true;
                        break;
                    }
                }
            }

            // Se non trova nulla, prova a cercare se il testo contiene il nome di una categoria
            if (!found) {
                for (let cat of categories) {
                    if (input.includes(cat.toLowerCase())) {
                        select.value = cat;
                        found = true;
                        break;
                    }
                }
            }
            
            badge.classList.toggle('hidden', !found);
        }

        function switchTab(p) {
            vibrate();
            document.getElementById('page-dashboard').classList.toggle('hidden', p !== 'dashboard');
            document.getElementById('page-settings').classList.toggle('hidden', p !== 'settings');
            document.getElementById('btn-dash').classList.toggle('nav-active', p === 'dashboard');
            document.getElementById('btn-set').classList.toggle('nav-active', p === 'settings');
            if(p === 'dashboard') render(); else renderSettingsPage();
        }

        function renderSettingsPage() {
            document.getElementById('settings-quick-list').innerHTML = quickSettings.map((s, i) => `
                <div class="flex items-center gap-3 bg-slate-100/50 p-3 rounded-2xl border border-slate-100">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center font-black text-[9px] ${s.type==='inc'?'bg-emerald-100 text-emerald-600':'bg-rose-100 text-rose-600'}">${s.type==='inc'?'IN':'OUT'}</div>
                    <div class="flex-1 text-xs font-bold text-slate-700 italic">${s.label} - €${s.amt}</div>
                    <button onclick="removeQuickSetting(${i})" class="text-slate-300 font-bold px-2">✕</button>
                </div>
            `).join('');
            document.getElementById('settings-cat-list').innerHTML = categories.map((c, i) => `
                <div class="flex justify-between items-center bg-slate-100/50 p-3 rounded-2xl border border-slate-100">
                    <span class="text-sm font-bold text-slate-700">${c}</span>
                    <button onclick="removeCategory(${i})" class="text-rose-300 font-bold px-2">✕</button>
                </div>
            `).join('');
        }

        function addQuickSetting() {
            const l = document.getElementById('new-q-label').value;
            const a = document.getElementById('new-q-amt').value;
            if(!l || !a) return;
            quickSettings.push({ label: l, amt: parseFloat(a), type: document.getElementById('new-q-type').value });
            localStorage.setItem('fin_v16_quick', JSON.stringify(quickSettings)); renderSettingsPage(); vibrate();
        }
        function removeQuickSetting(i) { quickSettings.splice(i, 1); localStorage.setItem('fin_v16_quick', JSON.stringify(quickSettings)); renderSettingsPage(); }
        function addCategory() { 
            const val = document.getElementById('new-cat-name').value.trim();
            if(!val) return; categories.push(val); localStorage.setItem('fin_v16_cats', JSON.stringify(categories)); 
            document.getElementById('new-cat-name').value = ''; renderSettingsPage(); vibrate();
        }
        function removeCategory(i) { categories.splice(i, 1); localStorage.setItem('fin_v16_cats', JSON.stringify(categories)); renderSettingsPage(); }

        function render() {
            document.getElementById('cat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('quick-actions-container').innerHTML = quickSettings.map(s => `
                <button onclick="addQuick('${s.label}', ${s.amt}, '${s.type}')" class="glass-card px-6 py-4 rounded-[2rem] shadow-sm shrink-0 active:scale-95 transition-all text-center">
                    <p class="text-[9px] font-black uppercase text-indigo-500 mb-1">${s.label}</p>
                    <p class="text-sm font-black text-slate-800 italic tracking-tighter">€${s.amt}</p>
                </button>
            `).join('');

            const filtered = transactions.filter(t => new Date(t.date).getMonth() === currentMonth);
            const total = transactions.reduce((s, t) => t.type === 'inc' ? s + t.amt : s - t.amt, 0);
            const mInc = filtered.filter(t => t.type === 'inc').reduce((s, t) => s + t.amt, 0);
            const mExp = filtered.filter(t => t.type === 'exp').reduce((s, t) => s + t.amt, 0);

            document.getElementById('month-label').innerText = monthNames[currentMonth];
            document.getElementById('total-balance').innerText = `€ ${total.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('m-inc').innerText = `+ €${mInc.toFixed(0)}`;
            document.getElementById('m-exp').innerText = `- €${mExp.toFixed(0)}`;

            document.getElementById('list').innerHTML = filtered.map(t => `
                <div class="glass-card p-5 rounded-[2rem] flex justify-between items-center border border-white mb-3">
                    <div class="truncate flex-1 pr-4">
                        <p class="font-extrabold text-slate-800 text-sm truncate tracking-tight">${t.dsc}</p>
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.1em] italic">${t.usr} • ${t.cat}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <p class="font-black ${t.type === 'inc' ? 'text-emerald-500' : 'text-rose-500'} text-xs italic
