<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanze Famiglia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding-bottom: 120px; }
        .hidden { display: none !important; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .nav-active { color: #6366f1; transform: scale(1.05); font-weight: 800; }
        .progress-bar { height: 6px; border-radius: 10px; background: #f1f5f9; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }
    </style>
</head>
<body>

    <div id="page-dashboard" class="max-w-md mx-auto px-5 pt-12">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 italic">Wallet</h1>
            <div class="flex gap-2">
                <select id="month-select" onchange="updateDate()" class="glass-card px-2 py-2 rounded-xl text-[10px] font-black outline-none"></select>
                <select id="year-select" onchange="updateDate()" class="glass-card px-2 py-2 rounded-xl text-[10px] font-black outline-none"></select>
            </div>
        </div>

        <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl mb-8 text-center">
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2">Saldo Totale</p>
            <h2 id="total-balance" class="text-4xl font-extrabold italic mb-6">€ 0,00</h2>
            <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                <div><p class="text-[9px] text-slate-500 uppercase">Mese +</p><p id="m-inc" class="text-emerald-400 font-bold">€ 0</p></div>
                <div><p class="text-[9px] text-slate-500 uppercase">Mese -</p><p id="m-exp" class="text-rose-400 font-bold">€ 0</p></div>
            </div>
        </div>

        <div id="input-card" class="glass-card rounded-[2.5rem] p-6 shadow-xl mb-10 space-y-4 border border-white">
            <div class="flex gap-2">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-slate-100/50 rounded-2xl p-4 font-extrabold text-xl outline-none">
                <select id="usr" class="w-1/2 bg-slate-100/50 rounded-2xl p-4 text-xs font-bold text-indigo-600 outline-none">
                    <option value="Stany">Stany</option>
                    <option value="Giulia">Giulia</option>
                </select>
            </div>
            <input type="text" id="dsc" oninput="predict(this.value)" placeholder="Cosa hai comprato?" class="w-full bg-slate-100/50 rounded-2xl p-4 text-sm outline-none">
            <select id="cat" class="w-full bg-slate-100/50 rounded-2xl p-4 text-sm font-bold text-slate-600 outline-none"></select>
            <div class="flex gap-3">
                <button onclick="save('inc')" class="flex-1 bg-slate-900 text-emerald-400 py-4 rounded-2xl font-bold uppercase text-[10px]">+ Entrata</button>
                <button onclick="save('exp')" class="flex-1 bg-slate-900 text-rose-400 py-4 rounded-2xl font-bold uppercase text-[10px]">- Uscita</button>
            </div>
        </div>

        <div id="analysis-section" class="hidden space-y-6 mb-10">
            <div class="glass-card rounded-[2.5rem] p-7 border border-white">
                <canvas id="chartPie" class="max-h-48 mx-auto mb-6"></canvas>
                <div id="cat-list" class="space-y-4"></div>
            </div>
            <div class="glass-card rounded-[2.5rem] p-7 border border-white">
                <canvas id="chartLine" class="max-h-60"></canvas>
            </div>
        </div>
        
        <div id="history-list" class="space-y-4 pb-20"></div>
    </div>

    <div id="page-settings" class="hidden max-w-md mx-auto px-6 pt-12">
        <h1 class="text-2xl font-bold mb-8">Impostazioni</h1>
        <button onclick="localStorage.clear(); location.reload();" class="w-full text-rose-400 font-bold py-10 uppercase text-xs">Azzera tutti i dati</button>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 bg-slate-900 h-20 rounded-[2rem] flex items-center justify-around z-50 shadow-2xl">
        <button onclick="tab('dashboard')" id
