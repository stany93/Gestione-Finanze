    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#0075EB' } } }
        }
        if (localStorage.getItem('fin_theme') === 'dark' || (!('fin_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        const appManifest = {
            "name": "Wallet Famiglia",
            "short_name": "Wallet",
            "start_url": window.location.href.split('?')[0],
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#0075EB",

                "sizes": "512x512",
                "type": "image/svg+xml",
                "purpose": "any maskable"
            }]
        };
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(appManifest));
        document.head.appendChild(manifestLink);
    </script>

        input, select { transition: all 0.2s; border: 1px solid transparent; }
        input:focus, select:focus { border-color: #0075EB !important; outline: none; box-shadow: 0 0 0 1px #0075EB; }

        @keyframes flash-exp { 0% { background: #ef4444; opacity: 0.2; } 100% { background: transparent; opacity: 1; } }
        .flash-inc { animation: flash-inc 0.8s ease-out; }
        .flash-exp { animation: flash-exp 0.8s ease-out; }

</head>

    <!-- FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCX6bNXQMKS_a0fIKga_nY07Jy9oJ8XiiI",
            authDomain: "wallet-famiglia.firebaseapp.com",
            projectId: "wallet-famiglia",
            storageBucket: "wallet-famiglia.firebasestorage.app",
            messagingSenderId: "909534951887",
            appId: "1:909534951887:web:3c3c4f5427ce3f2632baba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(query(collection(db, "transactions"), orderBy("date", "desc")), (snap) => {
            window.sharedTransactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (window.currentAccount === 'shared') {
                window.transactions = [...window.sharedTransactions];
                window.render();
            }
        });

        window.save = async (type) => {
            const a = document.getElementById('amt').value, d = document.getElementById('dsc').value;
            if(!a || !d) return;
            const newTx = { amt: parseFloat(a), dsc: d, cat: document.getElementById('cat').value, usr: document.getElementById('usr').value, type, date: new Date().toISOString() };
            if (window.currentAccount === 'shared') await addDoc(collection(db, "transactions"), newTx);
            else {
                newTx.id = Date.now().toString();
                window.transactions.unshift(newTx);
                localStorage.setItem('fin_v22_trans_' + window.currentAccount, JSON.stringify(window.transactions));
                window.render();
            }
            document.getElementById('amt').value = ''; document.getElementById('dsc').value = '';
            document.getElementById('input-card').classList.add(type === 'inc' ? 'flash-inc' : 'flash-exp');
            setTimeout(() => document.getElementById('input-card').classList.remove('flash-inc', 'flash-exp'), 1000);
        };

        window.deleteEntry = (id) => {
            confirmAction("Eliminare definitivamente la transazione?", async () => {
                if (window.currentAccount === 'shared') await deleteDoc(doc(db, "transactions", id));
                else {
                    window.transactions = window.transactions.filter(t => t.id !== id);
                    localStorage.setItem('fin_v22_trans_' + window.currentAccount, JSON.stringify(window.transactions));
                    window.render();
                }
            });
        };
    </script>

    <script>
        const monthNames = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
        const catColors = ['#0075EB', '#22C55E', '#F59E0B', '#EF4444', '#EC4899', '#8B5CF6', '#06B6D4', '#F97316', '#84CC16', '#3B82F6', '#D946EF', '#14B8A6'];
        let charts = { pie: null, line: null, history: null };

        const brain = {
            'Casa': ['affitto', 'bolletta', 'luce', 'gas', 'acqua', 'fibra', 'wifi', 'casa', 'mutuo'],
            'Spesa': ['esselunga', 'conad', 'coop', 'lidl', 'iper', 'eurospin', 'spesa', 'cibo'],
            'Riccardo': ['pannolini', 'nido', 'pappa', 'latte', 'giochi', 'biberon', 'asilo', 'riccardo'],
            'Svago': ['cinema', 'pub', 'bar', 'caffè', 'birra', 'concerto', 'drink', 'film'],
            'Lavoro': ['stipendio', 'bonus', 'fattura', 'cliente', 'lavoro'],
            'Gatti': ['gatto', 'gatti', 'croccantini', 'sabbietta', 'veterinario', 'lettiera'],
            'Macchina': ['benzina', 'diesel', 'parcheggio', 'meccanico', 'bollo', 'auto', 'telepass'],
            'Cene': ['pizza', 'ristorante', 'sushi', 'burger', 'kebab', 'osteria'],
            'Vestiti': ['vestiti', 'scarpe', 'maglia', 'zalando', 'zara', 'h&m'],
            'Vacanze': ['vacanza', 'hotel', 'volo', 'aereo', 'treno', 'booking'],
            'Regali': ['regalo', 'regali', 'compleanno', 'festa'],
            'Salute': ['farmacia', 'medico', 'dentista', 'visita', 'analisi']
        };

        window.sharedTransactions = []; window.transactions = [];
        window.currentAccount = localStorage.getItem('fin_v22_currentAccount') || 'shared';
        window.accounts = JSON.parse(localStorage.getItem('fin_v22_accounts')) || [{ id: 'shared', name: 'Famiglia', type: 'cloud' }];
        window.categories = JSON.parse(localStorage.getItem('fin_v22_cats')) || Object.keys(brain);
        window.quickSettings = JSON.parse(localStorage.getItem('fin_v22_quick')) || [{ label: 'Spesa', amt: 50, type: 'exp' }];

        window.confirmAction = (msg, cb) => {
            document.getElementById('modal-message').innerText = msg;
            window.pendingAction = cb;
            document.getElementById('custom-modal').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('custom-modal').classList.add('hidden');
        document.getElementById('modal-confirm-btn').onclick = () => {
            if(window.pendingAction) window.pendingAction();
            closeModal();
        };

        window.switchAccount = (id) => {
            window.currentAccount = id; localStorage.setItem('fin_v22_currentAccount', id);
            const acc = window.accounts.find(a => a.id === id);
            document.getElementById('account-display-name').innerText = acc ? acc.name : 'Conto';
            document.getElementById('sync-status').className = id === 'shared' ? 'w-2 h-2 bg-emerald-400 rounded-full animate-pulse' : 'w-2 h-2 bg-slate-300 dark:bg-slate-600 rounded-full';
            window.transactions = id === 'shared' ? [...window.sharedTransactions] : JSON.parse(localStorage.getItem('fin_v22_trans_' + id)) || [];
            window.render();
        };

        window.render = () => {
            const m = parseInt(document.getElementById('month-select').value), y = parseInt(document.getElementById('year-select').value);
            document.getElementById('cat').innerHTML = window.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            
            const filtered = window.transactions.filter(t => { const d = new Date(t.date); return d.getMonth() === m && d.getFullYear() === y; });
            const total = window.transactions.reduce((s, t) => t.type === 'inc' ? s + t.amt : s - t.amt, 0);
            const mInc = filtered.filter(t => t.type === 'inc').reduce((s, t) => s + t.amt, 0);
            const mExp = filtered.filter(t => t.type === 'exp').reduce((s, t) => s + t.amt, 0);

            document.getElementById('total-balance').innerText = `€ ${total.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('m-inc').innerText = `€ ${mInc.toLocaleString('it-IT')}`;
            document.getElementById('m-exp').innerText = `€ ${mExp.toLocaleString('it-IT')}`;
            document.getElementById('date-label').innerText = `${monthNames[m]} ${y}`;

            document.getElementById('quick-actions-container').innerHTML = window.quickSettings.map(s => `<button onclick="addQuick('${s.label}', ${s.amt}, '${s.type}')" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-6 py-3 rounded-full shrink-0 shadow-sm"><p class="text-[11px] font-black dark:text-white uppercase tracking-tighter">${s.label} (€${s.amt})</p></button>`).join('');

            document.getElementById('list').innerHTML = filtered.map(t => `<div class="bg-white dark:bg-slate-900 p-5 rounded-[1.8rem] flex justify-between items-center border border-slate-200 dark:border-slate-800 shadow-sm text-sm mb-3"><div class="flex-1 text-left"><b>${t.dsc.toUpperCase()}</b><p class="text-[10px] text-slate-500 uppercase mt-1 text-left">${t.usr} • ${t.cat} • ${new Date(t.date).getDate()} ${monthNames[new Date(t.date).getMonth()]}</p></div><div class="flex items-center gap-4"><b class="${t.type === 'inc' ? 'text-emerald-500' : ''}">€ ${t.amt.toFixed(2)}</b><button onclick="window.deleteEntry('${t.id}')" class="text-slate-300 transition-colors">✕</button></div></div>`).join('');
            
            const catTotals = filtered.filter(t => t.type === 'exp').reduce((acc, t) => { acc[t.cat] = (acc[t.cat] || 0) + t.amt; return acc; }, {});
            const sorted = Object.entries(catTotals).sort((a,b) => b[1] - a[1]);
            document.getElementById('category-recap-list').innerHTML = sorted.map(([name, val], i) => {
                const perc = mExp > 0 ? (val/mExp*100).toFixed(0) : 0;
                return `<div class="space-y-2 text-left"><div class="flex justify-between text-xs font-black uppercase"><span>${name}</span><span>€ ${val.toFixed(2)} (${perc}%)</span></div><div class="w-full bg-slate-100 dark:bg-slate-800 h-2.5 rounded-full overflow-hidden"><div class="h-full transition-all duration-1000" style="width:${perc}%; background:${catColors[i % catColors.length]}"></div></div></div>`;
            }).join('');

            updateCharts(filtered);
        };

        function updateCharts(data) {
            const isDark = document.documentElement.classList.contains('dark');
            const labelColor = isDark ? '#475569' : '#94a3b8';
            const m = parseInt(document.getElementById('month-select').value), y = parseInt(document.getElementById('year-select').value);

            if(charts.pie) charts.pie.destroy();
            const exp = data.filter(t => t.type === 'exp');
            const catTotals = exp.reduce((acc, t) => { acc[t.cat] = (acc[t.cat] || 0) + t.amt; return acc; }, {});
            charts.pie = new Chart(document.getElementById('chartPie'), {
                type: 'doughnut',
                data: { labels: Object.keys(catTotals), datasets: [{ data: Object.values(catTotals), backgroundColor: catColors, borderWidth: 0 }] },
                options: { maintainAspectRatio: false, cutout: '82%', plugins: { legend: { display: false } } }
            });
            
            const last6 = [];
            for(let i=5; i>=0; i--) { let d = new Date(y, m-i, 1); last6.push({ m: d.getMonth(), y: d.getFullYear() }); }
            const lineData = last6.map(o => window.transactions.filter(t => { const d = new Date(t.date); return d.getMonth() === o.m && d.getFullYear() === o.y && t.type === 'exp'; }).reduce((s, t) => s + t.amt, 0));
            
            if(charts.line) charts.line.destroy();
            charts.line = new Chart(document.getElementById('chartLine'), {
                type: 'line',
                data: { labels: last6.map(o => monthNames[o.m]), datasets: [{ data: lineData, borderColor: '#0075EB', borderWidth: 3, tension: 0.4, fill: true, backgroundColor: 'rgba(0,117,235,0.05)', pointRadius: 4 }] },
                options: { 
                    maintainAspectRatio: false, plugins: { legend: { display: false } },
                    scales: { 
                        y: { ticks: { callback: (v) => v + ' €', color: labelColor, font: {size: 9} }, grid: { color: isDark ? '#1e293b' : '#f1f5f9' } },
                        x: { ticks: { color: labelColor, font: {size: 9} }, grid: { display: false } }
                    } 
                }
            });

            const historyData = last6.map(o => {
                return window.transactions.filter(t => {
                    const d = new Date(t.date);
                    return d <= new Date(o.y, o.m + 1, 0);
                }).reduce((s, t) => t.type === 'inc' ? s + t.amt : s - t.amt, 0);
            });

            if(charts.history) charts.history.destroy();
            charts.history = new Chart(document.getElementById('chartBalanceHistory'), {
                type: 'line',
                data: { labels: last6.map(o => monthNames[o.m]), datasets: [{ 
                    data: historyData, 
                    borderColor: '#0075EB', 
                    borderWidth: 2.5, 
                    tension: 0.4, 
                    fill: true, 
                    pointRadius: 3,
                    pointBackgroundColor: '#0075EB',
                    backgroundColor: (context) => {
                        const ctx = context.chart.ctx;
                        const gradient = ctx.createLinearGradient(0, 0, 0, 150);
                        gradient.addColorStop(0, 'rgba(0, 117, 235, 0.15)');
                        gradient.addColorStop(1, 'rgba(0, 117, 235, 0)');
                        return gradient;
                    }
                }] },
                options: { 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: false }, 
                        tooltip: { callbacks: { label: (ctx) => ` € ${ctx.raw.toLocaleString('it-IT')}` } } 
                    },
                    scales: { 
                        y: { 
                            display: true, 
                            position: 'right',
                            ticks: { 
                                callback: (v) => v.toLocaleString('it-IT') + ' €',
                                color: labelColor, 
                                font: {size: 8},
                                maxTicksLimit: 3
                            }, 
                            grid: { display: false } 
                        }, 
                        x: { 
                            display: true, 
                            ticks: { color: labelColor, font: {size: 8}, padding: 5 }, 
                            grid: { display: false } 
                        } 
                    }
                }
            });
        }

        window.toggleTheme = () => { document.documentElement.classList.toggle('dark'); localStorage.setItem('fin_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); window.render(); };
        window.saveCurrentUser = (v) => localStorage.setItem('fin_v22_currentUser', v);
        window.addQuick = (l, a, t) => { document.getElementById('amt').value = a; document.getElementById('dsc').value = l; window.predictCategory(l); window.save(t); };
        window.addAccount = () => { const n = document.getElementById('new-account-name').value.trim(); if(!n) return; const id = 'local_'+Date.now(); window.accounts.push({ id, name: n, type: 'local' }); localStorage.setItem('fin_v22_accounts', JSON.stringify(window.accounts)); window.switchAccount(id); window.switchTab('dashboard'); };
        window.removeAccount = (i) => { if(window.accounts[i].id === 'shared') return; confirmAction(`Eliminare il conto "${window.accounts[i].name}"?`, () => { localStorage.removeItem('fin_v22_trans_' + window.accounts[i].id); window.accounts.splice(i, 1); localStorage.setItem('fin_v22_accounts', JSON.stringify(window.accounts)); window.switchAccount('shared'); window.renderSettingsPage(); }); };
        window.addQuickSetting = () => { const l = document.getElementById('new-q-label').value, a = document.getElementById('new-q-amt').value; if(!l||!a) return; window.quickSettings.push({ label: l, amt: parseFloat(a), type: document.getElementById('new-q-type').value }); localStorage.setItem('fin_v22_quick', JSON.stringify(window.quickSettings)); window.renderSettingsPage(); };
        window.removeQuickSetting = (i) => { confirmAction(`Eliminare il tasto rapido "${window.quickSettings[i].label}"?`, () => { window.quickSettings.splice(i,1); localStorage.setItem('fin_v22_quick', JSON.stringify(window.quickSettings)); window.renderSettingsPage(); }); };
        window.addCategory = () => { const v = document.getElementById('new-cat-name').value.trim(); if(!v) return; window.categories.push(v); localStorage.setItem('fin_v22_cats', JSON.stringify(window.categories)); window.renderSettingsPage(); };
        window.removeCategory = (i) => { confirmAction(`Eliminare la categoria "${window.categories[i]}"?`, () => { window.categories.splice(i,1); localStorage.setItem('fin_v22_cats', JSON.stringify(window.categories)); window.renderSettingsPage(); }); };
        window.updateDateFilter = () => window.render();
        window.predictCategory = (t) => { const v = t.toLowerCase(); for(let c in brain) { if(brain[c].some(k => v.includes(k)) && window.categories.includes(c)) { document.getElementById('cat').value = c; document.getElementById('ai-badge').classList.remove('hidden'); return; } } document.getElementById('ai-badge').classList.add('hidden'); };
        window.exportToCSV = () => {
            const acc = window.accounts.find(a => a.id === window.currentAccount);
            let c = "Data,Tipo,Importo,Categoria,Utente,Descrizione\n";
            window.transactions.forEach(t => c += `${new Date(t.date).toLocaleString('it-IT')},${t.type === 'inc' ? 'Entrata' : 'Uscita'},${t.amt},${t.cat},${t.usr},"${t.dsc.replace(/"/g, '""')}"\n`);
            const b = new Blob([c], {type: 'text/csv;charset=utf-8;'});
            const u = URL.createObjectURL(b);
            const l = document.createElement("a"); l.href = u; l.download = `Wallet_${acc.name.replace(/\s+/g, '_')}.csv`; l.click();
        };

        window.switchTab = (p) => {
            document.getElementById('page-dashboard').classList.toggle('hidden', p !== 'dashboard');
            document.getElementById('page-settings').classList.toggle('hidden', p !== 'settings');
            document.getElementById('btn-dash').classList.toggle('nav-active', p === 'dashboard');
            document.getElementById('btn-set').classList.toggle('nav-active', p === 'settings');
            if(p === 'dashboard') window.render(); else window.renderSettingsPage();
        };

        window.renderSettingsPage = () => {
            const svgClose = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>`;
            document.getElementById('settings-accounts-list').innerHTML = window.accounts.filter(a => a.id !== 'shared').map((a, i) => `<div class="flex justify-between items-center bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl mb-2"><span>${a.name}</span><button onclick="removeAccount(${window.accounts.indexOf(a)})" class="text-rose-500">${svgClose}</button></div>`).join('');
            document.getElementById('settings-quick-list').innerHTML = window.quickSettings.map((s, i) => `<div class="flex justify-between items-center bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-4 rounded-2xl mb-2 shadow-sm"><span>${s.label} (€${s.amt})</span><button onclick="removeQuickSetting(${i})" class="text-rose-500">${svgClose}</button></div>`).join('');
            document.getElementById('settings-cat-list').innerHTML = window.categories.map((c, i) => `<div class="flex justify-between items-center bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-800 p-3 rounded-xl mb-2 shadow-sm uppercase font-bold text-xs"><span>${c}</span><button onclick="removeCategory(${i})" class="text-rose-500">${svgClose}</button></div>`).join('');
        };

        window.onload = () => {
            const ms = document.getElementById('month-select'), ys = document.getElementById('year-select'), now = new Date();
            monthNames.forEach((m, i) => ms.innerHTML += `<option value="${i}" ${i === now.getMonth() ? 'selected' : ''}>${m}</option>`);
            for(let y = now.getFullYear()-1; y<=now.getFullYear()+1; y++) ys.innerHTML += `<option value="${y}" ${y === now.getFullYear() ? 'selected' : ''}>${y}</option>`;
            
            const savedUsr = localStorage.getItem('fin_v22_currentUser');
            if(savedUsr) document.getElementById('usr').value = savedUsr;
            
            const sel = document.getElementById('account-select');
            sel.innerHTML = window.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
            
            window.switchAccount(window.currentAccount);
        };
    </script>
</body>
</html>
