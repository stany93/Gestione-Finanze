<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanze Famiglia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <div class="max-w-md mx-auto px-4 pt-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black text-slate-800">Finanze Famiglia</h1>
                <p id="month-label" class="text-indigo-600 font-bold uppercase text-[10px] tracking-widest"></p>
            </div>
            <select id="month-select" onchange="updateMonth(this.value)" class="bg-white p-2 rounded-lg shadow-sm border border-slate-200 text-[10px] font-bold uppercase outline-none"></select>
        </div>

        <div class="bg-indigo-600 rounded-[2rem] p-6 text-white shadow-xl mb-6">
            <h2 id="total-balance" class="text-4xl font-black text-center mb-4 text-white">€ 0.00</h2>
            <div class="grid grid-cols-2 gap-4 border-t border-indigo-400/50 pt-4 text-center text-sm">
                <div>
                    <p class="text-indigo-200 text-[9px] uppercase">Entrate Mese</p>
                    <p id="m-inc" class="font-bold text-emerald-300">+ €0.00</p>
                </div>
                <div>
                    <p class="text-indigo-200 text-[9px] uppercase">Uscite Mese</p>
                    <p id="m-exp" class="font-bold text-rose-300">- €0.00</p>
                </div>
            </div>
        </div>

        <div class="mb-6 overflow-x-auto whitespace-nowrap pb-2 no-scrollbar">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2 px-1 text-center">Aggiunta Rapida Ricorrenti</p>
            <div class="flex gap-2 justify-center">
                <button onclick="addQuick('🏠 Affitto', 600, 'Uscita')" class="bg-white px-4 py-2 rounded-full shadow-sm text-xs font-bold border border-slate-100 italic">🏠 Affitto</button>
                <button onclick="addQuick('⚡ Bollette', 80, 'Uscita')" class="bg-white px-4 py-2 rounded-full shadow-sm text-xs font-bold border border-slate-100 italic">⚡ Bollette</button>
                <button onclick="addQuick('💰 Stipendio', 1800, 'Entrata')" class="bg-white px-4 py-2 rounded-full shadow-sm text-xs font-bold border border-slate-100 italic">💰 Stipendio</button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] p-6 shadow-md mb-6 space-y-4">
            <div class="flex gap-2">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-slate-50 rounded-2xl p-4 font-bold text-lg outline-none">
                <select id="usr" class="w-1/2 bg-slate-50 rounded-2xl p-4 text-sm font-bold text-indigo-600 outline-none">
                    <option value="Stany">Stany</option>
                    <option value="Giulia">Giulia</option>
                </select>
            </div>
            <input type="text" id="dsc" placeholder="Descrizione..." class="w-full bg-slate-50 rounded-2xl p-4 outline-none">
            <select id="cat" class="w-full bg-slate-50 rounded-2xl p-4 outline-none text-slate-600">
                <option value="🏠 Casa">🏠 Casa / Affitto</option>
                <option value="🛒 Spesa">🛒 Spesa Supermercato</option>
                <option value="👶 Riccardo">👶 Riccardo / Bimbo</option>
                <option value="🍕 Tortellini">🍕 Ristorante / Svago</option>
                <option value="🚗 Mezzi">🚗 Auto / Bus / Treno</option>
                <option value="💰 Lavoro">💰 Stipendio / Entrate</option>
                <option value="📱 Varie">📱 Abbonamenti / Web</option>
            </select>
            <div class="flex gap-3">
                <button onclick="save('inc')" class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-bold active:scale-95 transition-transform">+ ENTRATA</button>
                <button onclick="save('exp')" class="flex-1 bg-rose-500 text-white py-4 rounded-2xl font-bold active:scale-95 transition-transform">- USCITA</button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] p-6 shadow-md mb-6 space-y-8">
            <div>
                <h3 class="text-slate-400 font-bold text-[10px] uppercase mb-4 text-center tracking-widest">Spese per Categoria</h3>
                <canvas id="chartPie" class="max-h-48 mx-auto"></canvas>
            </div>
            <div class="border-t border-slate-50 pt-6">
                <h3 class="text-slate-400 font-bold text-[10px] uppercase mb-4 text-center tracking-widest">Andamento Mensile (Line)</h3>
                <canvas id="chartLine" class="max-h-48 mx-auto"></canvas>
            </div>
        </div>

        <div id="list" class="space-y-3 pb-10"></div>

        <button onclick="resetData()" class="w-full text-slate-300 text-[10px] font-bold uppercase py-10">Svuota Memoria</button>
    </div>

    <script>
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        let transactions = JSON.parse(localStorage.getItem('family_v4')) || [];
        let currentMonth = new Date().getMonth();
        let pieChart = null;
        let lineChart = null;

        // Inizializza selettore mesi
        const select = document.getElementById('month-select');
        monthNames.forEach((m, i) => {
            select.innerHTML += `<option value="${i}" ${i === currentMonth ? 'selected' : ''}>${m.substring(0,3)}</option>`;
        });

        function updateMonth(val) {
            currentMonth = parseInt(val);
            render();
        }

        function addQuick(cat, amt, type) {
            document.getElementById('cat').value = cat;
            document.getElementById('amt').value = amt;
            document.getElementById('dsc').value = "Ricorrente: " + cat.split(' ')[1];
            save(type === 'Entrata' ? 'inc' : 'exp');
        }

        function save(type) {
            const a = document.getElementById('amt').value;
            const d = document.getElementById('dsc').value;
            if(!a || !d) return alert("Inserisci importo e descrizione");

            transactions.unshift({
                id: Date.now(),
                amt: parseFloat(a),
                dsc: d,
                cat: document.getElementById('cat').value,
                usr: document.getElementById('usr').value,
                type: type,
                date: new Date().toISOString()
            });

            localStorage.setItem('family_v4', JSON.stringify(transactions));
            document.getElementById('amt').value = '';
            document.getElementById('dsc').value = '';
            render();
        }

        function render() {
            const filtered = transactions.filter(t => new Date(t.date).getMonth() === currentMonth);
            
            const total = transactions.reduce((s, t) => t.type === 'inc' ? s + t.amt : s - t.amt, 0);
            const mInc = filtered.filter(t => t.type === 'inc').reduce((s, t) => s + t.amt, 0);
            const mExp = filtered.filter(t => t.type === 'exp').reduce((s, t) => s + t.amt, 0);

            document.getElementById('month-label').innerText = monthNames[currentMonth];
            document.getElementById('total-balance').innerText = `€ ${total.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('m-inc').innerText = `+ €${mInc.toFixed(2)}`;
            document.getElementById('m-exp').innerText = `- €${mExp.toFixed(2)}`;

            const listEl = document.getElementById('list');
            listEl.innerHTML = filtered.map(t => `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="bg-slate-50 w-10 h-10 rounded-full flex items-center justify-center text-lg">${t.cat.split(' ')[0]}</div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${t.dsc}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">${t.usr} • ${new Date(t.date).toLocaleDateString('it-IT')}</p>
                        </div>
                    </div>
                    <p class="font-black ${t.type === 'inc' ? 'text-emerald-500' : 'text-rose-500'}">
                        ${t.type === 'inc' ? '+' : '-'} €${t.amt.toFixed(2)}
                    </p>
                </div>
            `).join('');

            updateCharts(filtered);
        }

        function updateCharts(data) {
            // PIE CHART
            const expenses = data.filter(t => t.type === 'exp');
            const cats = [...new Set(expenses.map(t => t.cat))];
            const pieTotals = cats.map(c => expenses.filter(t => t.cat === c).reduce((s, t) => s + t.amt, 0));

            const ctxPie = document.getElementById('chartPie').getContext('2d');
            if(pieChart) pieChart.destroy();
            pieChart = new Chart(ctxPie, {
                type: 'doughnut',
                data: { labels: cats, datasets: [{ data: pieTotals, backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899'], borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '75%' }
            });

            // LINE CHART (Storico ultimi 6 mesi)
            const last6Months = [];
            for(let i = 5; i >= 0; i--) {
                const m = (new Date().getMonth() - i + 12) % 12;
                last6Months.push(m);
            }
            const lineData = last6Months.map(m => {
                return transactions.filter(t => new Date(t.date).getMonth() === m && t.type === 'exp').reduce((s, t) => s + t.amt, 0);
            });

            const ctxLine = document.getElementById('chartLine').getContext('2d');
            if(lineChart) lineChart.destroy();
            lineChart = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: last6Months.map(m => monthNames[m].substring(0,3)),
                    datasets: [{
                        label: 'Uscite',
                        data: lineData,
                        borderColor: '#6366f1',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.1)'
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        function resetData() {
            if(confirm("Attenzione: vuoi davvero cancellare tutto?")) {
                localStorage.removeItem('family_v4');
                location.reload();
            }
        }

        render();
    </script>
</body>
</html>
