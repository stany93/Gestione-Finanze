<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanze Famiglia</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .custom-scroll::-webkit-scrollbar { display: none; }
    </script>
</head>
<body class="bg-slate-100 min-h-screen pb-20">
    <div class="max-w-md mx-auto px-4 pt-6">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black text-slate-800">Finanze Famiglia</h1>
                <p id="current-month-display" class="text-indigo-600 font-bold uppercase text-xs tracking-widest"></p>
            </div>
            <button onclick="exportToCSV()" class="bg-white p-2 rounded-xl shadow-sm text-slate-600 text-xs font-bold border border-slate-200">Esporta CSV</button>
        </div>

        <!-- Riepilogo Saldo -->
        <div class="bg-indigo-600 rounded-3xl shadow-xl p-6 text-white mb-6">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <p class="text-indigo-100 text-xs font-medium uppercase">Bilancio Totale</p>
                    <h2 id="total-balance" class="text-3xl font-bold">€ 0.00</h2>
                </div>
                <select id="month-filter" onchange="renderUI()" class="bg-indigo-500 text-white border-none rounded-lg text-sm p-1 outline-none">
                    <!-- Popolato da JS -->
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4 border-t border-indigo-500 pt-4">
                <div>
                    <p class="text-indigo-200 text-[10px] uppercase">Entrate Mese</p>
                    <p id="month-income" class="font-bold text-emerald-300">+ €0.00</p>
                </div>
                <div>
                    <p class="text-indigo-200 text-[10px] uppercase">Uscite Mese</p>
                    <p id="month-expense" class="font-bold text-rose-300">- €0.00</p>
                </div>
            </div>
        </div>

        <!-- Obiettivo Risparmio -->
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-6">
            <div class="flex justify-between text-xs font-bold text-slate-500 mb-2">
                <span>OBIETTIVO RISPARMIO</span>
                <span id="savings-percent">0%</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-2 mb-2">
                <div id="savings-bar" class="bg-emerald-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="savings-text" class="text-[10px] text-slate-400">Inserisci entrate per avvicinarti al traguardo.</p>
        </div>

        <!-- Form Inserimento -->
        <div class="bg-white rounded-3xl shadow-md p-6 mb-6">
            <div class="space-y-3">
                <div class="flex gap-2">
                    <input type="number" id="amount" placeholder="0.00" class="flex-1 bg-slate-50 border-none rounded-xl p-3 text-lg font-bold outline-none">
                    <select id="user" class="bg-slate-50 border-none rounded-xl p-3 text-sm outline-none">
                        <option value="Io">Io</option>
                        <option value="Giulia">Giulia</option>
                    </select>
                </div>
                <input type="text" id="description" placeholder="Cosa hai comprato?" class="w-full bg-slate-50 border-none rounded-xl p-3 outline-none">
                <select id="category" class="w-full bg-slate-50 border-none rounded-xl p-3 outline-none">
                    <option value="🏠 Casa">🏠 Casa / Affitto</option>
                    <option value="🛒 Spesa">🛒 Spesa</option>
                    <option value="💰 Stipendio">💰 Stipendio / Bonus</option>
                    <option value="🚗 Auto">🚗 Auto / Trasporti</option>
                    <option value="🍕 Svago">🍕 Svago / Ristorante</option>
                    <option value="👶 Riccardo">👶 Riccardo / Bimbo</option>
                    <option value="📱 Varie">📱 Bollette / Varie</option>
                </select>
                <div class="flex gap-2 pt-2">
                    <button onclick="addTransaction('income')" class="flex-1 bg-emerald-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-emerald-100">ENTRATA</button>
                    <button onclick="addTransaction('expense')" class="flex-1 bg-rose-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-rose-100">USCITA</button>
                </div>
            </div>
        </div>

        <!-- Grafico e Ricerca -->
        <div class="bg-white rounded-3xl shadow-md p-6 mb-6 text-center">
            <canvas id="financeChart" class="max-h-48 mx-auto"></canvas>
        </div>

        <div class="mb-4">
            <input type="text" id="search" oninput="renderUI()" placeholder="Cerca tra le spese..." class="w-full bg-white border-none rounded-xl p-3 shadow-sm outline-none text-sm">
        </div>

        <!-- Lista Transazioni -->
        <div id="transaction-list" class="space-y-3">
            <!-- JS -->
        </div>

        <button onclick="clearAll()" class="w-full mt-10 text-slate-300 text-[10px] font-bold tracking-widest uppercase">Reset Totale Dati</button>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('family_finance_v2')) || [];
        let myChart;
        const savingsGoal = 5000; // Puoi cambiare questa cifra come obiettivo

        // Inizializza i mesi nel filtro
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const monthFilter = document.getElementById('month-filter');
        const currentMonth = new Date().getMonth();
        monthNames.forEach((m, i) => {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = m;
            opt.selected = i === currentMonth;
            monthFilter.appendChild(opt);
        });

        function addTransaction(type) {
            const amount = document.getElementById('amount').value;
            const desc = document.getElementById('description').value;
            if(!amount || !desc) return alert("Inserisci dati validi");

            const t = {
                id: Date.now(),
                amount: parseFloat(amount),
                description: desc,
                category: document.getElementById('category').value,
                user: document.getElementById('user').value,
                type: type,
                date: new Date().toISOString()
            };

            transactions.unshift(t);
            localStorage.setItem('family_finance_v2', JSON.stringify(transactions));
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            renderUI();
        }

        function renderUI() {
            const selectedMonth = parseInt(document.getElementById('month-filter').value);
            const searchTerm = document.getElementById('search').value.toLowerCase();
            
            // Filtro per mese e ricerca
            const filtered = transactions.filter(t => {
                const date = new Date(t.date);
                const matchesMonth = date.getMonth() === selectedMonth;
                const matchesSearch = t.description.toLowerCase().includes(searchTerm) || t.category.toLowerCase().includes(searchTerm);
                return matchesMonth && matchesSearch;
            });

            // Calcoli Totali
            const total = transactions.reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0);
            const mIncome = filtered.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0);
            const mExpense = filtered.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);

            document.getElementById('total-balance').innerText = `€ ${total.toLocaleString('it-IT')}`;
            document.getElementById('month-income').innerText = `+ €${mIncome.toFixed(2)}`;
            document.getElementById('month-expense').innerText = `- €${mExpense.toFixed(2)}`;
            document.getElementById('current-month-display').innerText = monthNames[selectedMonth];

            // Aggiorna Obiettivo
            const progress = Math.min((total / savingsGoal) * 100, 100);
            document.getElementById('savings-bar').style.width = (progress > 0 ? progress : 0) + '%';
            document.getElementById('savings-percent').innerText = Math.max(0, Math.floor(progress)) + '%';

            // Lista HTML
            const list = document.getElementById('transaction-list');
            list.innerHTML = filtered.map(t => `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="bg-slate-50 w-10 h-10 rounded-full flex items-center justify-center text-lg">${t.category.split(' ')[0]}</div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${t.description}</p>
                            <p class="text-[10px] text-slate-400 uppercase font-bold">${t.user} • ${new Date(t.date).toLocaleDateString('it-IT')}</p>
                        </div>
                    </div>
                    <p class="font-black ${t.type === 'income' ? 'text-emerald-500' : 'text-rose-500'}">
                        ${t.type === 'income' ? '+' : '-'} €${t.amount.toFixed(2)}
                    </p>
                </div>
            `).join('');

            updateChart(filtered);
        }

        function updateChart(data) {
            const expenses = data.filter(t => t.type === 'expense');
            const cats = [...new Set(expenses.map(t => t.category))];
            const totals = cats.map(c => expenses.filter(t => t.category === c).reduce((s, t) => s + t.amount, 0));

            const ctx = document.getElementById('financeChart').getContext('2d');
            if(myChart) myChart.destroy();
            if(cats.length === 0) return;

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: cats,
                    datasets: [{ data: totals, backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#06b6d4'], borderWidth: 0 }]
                },
                options: { plugins: { legend: { display: false } }, cutout: '80%' }
            });
        }

        function exportToCSV() {
            let csv = "Data,Utente,Descrizione,Categoria,Tipo,Importo\n";
            transactions.forEach(t => {
                csv += `${new Date(t.date).toLocaleDateString()},${t.user},${t.description},${t.category},${t.type},${t.amount}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'finanze_famiglia.csv');
            a.click();
        }

        function clearAll() {
            if(confirm("Sei sicuro? Cancellerai tutto lo storico.")) {
                transactions = [];
                localStorage.removeItem('family_finance_v2');
                renderUI();
            }
        }

        renderUI();
    </script>
</body>
</html>
