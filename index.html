<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanze</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* Stili di emergenza se Tailwind non carica */
        body { font-family: sans-serif; background-color: #f8fafc; margin: 0; padding-bottom: env(safe-area-inset-bottom, 100px); }
        .main-container { max-width: 450px; margin: 0 auto; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; border: 1px solid #f1f5f9; }
        .dark-card { background: #0f172a; color: white; border-radius: 32px; padding: 30px; text-align: center; }
        
        /* Navbar fissa */
        .navbar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 70px; background: #0f172a; border-radius: 40px; display: flex; align-items: center; justify-content: space-around; z-index: 100; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3); }
        .nav-btn { color: #64748b; font-size: 24px; border: none; background: none; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: #6366f1; transform: scale(1.2); }
        
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, select { background: #f1f5f9; border-radius: 12px; padding: 12px; border: none; font-size: 16px; width: 100%; outline: none; }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div id="page-home">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 style="font-size: 28px; font-weight: 800; color: #0f172a; margin: 0;">Wallet</h1>
                <div style="display: flex; gap: 5px;">
                    <select id="m-sel" onchange="changeDate()" style="width: auto; padding: 5px 10px; font-size: 12px;"></select>
                    <select id="y-sel" onchange="changeDate()" style="width: auto; padding: 5px 10px; font-size: 12px;"></select>
                </div>
            </div>

            <div class="dark-card">
                <p style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; margin: 0 0 10px 0;">Patrimonio Totale</p>
                <h2 id="total-bal" style="font-size: 36px; margin: 0 0 20px 0; letter-spacing: -1px;">€ 0,00</h2>
                <div style="display: flex; justify-content: space-around; border-top: 1px solid #1e293b; pt: 15px;">
                    <div><p style="font-size: 9px; color: #64748b; margin: 5px 0;">Entrate</p><p id="m-inc" style="color: #10b981; font-weight: bold; margin: 0;">€ 0</p></div>
                    <div style="width: 1px; background: #1e293b; height: 30px; margin-top: 10px;"></div>
                    <div><p style="font-size: 9px; color: #64748b; margin: 5px 0;">Uscite</p><p id="m-exp" style="color: #ef4444; font-weight: bold; margin: 0;">€ 0</p></div>
                </div>
            </div>

            <div id="quick-actions" class="no-scrollbar" style="display: flex; gap: 10px; overflow-x: auto; margin: 20px 0; padding-bottom: 5px;"></div>

            <div class="card">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="number" id="amt" placeholder="0.00" style="flex: 1; font-weight: 800;">
                    <select id="usr" style="flex: 1; color: #6366f1; font-weight: bold;">
                        <option value="Stany">Stany</option>
                        <option value="Giulia">Giulia</option>
                    </select>
                </div>
                <input type="text" id="dsc" oninput="predict(this.value)" placeholder="Cosa hai pagato?" style="margin-bottom: 10px;">
                <select id="cat" style="margin-bottom: 15px; font-weight: 600;"></select>
                <div style="display: flex; gap: 10px;">
                    <button onclick="save('inc')" style="flex: 1; background: #0f172a; color: #10b981; padding: 15px; border-radius: 16px; border: 1px solid #1e293b; font-weight: 800; font-size: 12px; cursor: pointer;">RICEVUTO</button>
                    <button onclick="save('exp')" style="flex: 1; background: #0f172a; color: #ef4444; padding: 15px; border-radius: 16px; border: 1px solid #1e293b; font-weight: 800; font-size: 12px; cursor: pointer;">SPESO</button>
                </div>
            </div>

            <div class="card"><canvas id="chartPie" style="max-height: 200px;"></canvas></div>
            <div id="list" style="padding-bottom: 80px;"></div>
        </div>

        <div id="page-set" class="hidden">
            <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 20px;">Configurazione</h1>
            <div class="card">
                <p style="font-size: 10px; font-weight: 800; color: #6366f1; text-transform: uppercase;">Tasti Rapidi</p>
                <div id="set-quick" style="margin: 15px 0;"></div>
                <div style="background: #f8fafc; padding: 15px; border-radius: 16px;">
                    <input type="text" id="new-q-l" placeholder="Nome Tasto" style="background: white; margin-bottom: 10px;">
                    <input type="number" id="new-q-a" placeholder="Importo €" style="background: white; margin-bottom: 10px;">
                    <button onclick="addQ()" style="width: 100%; background: #6366f1; color: white; padding: 12px; border-radius: 12px; border: none; font-weight: bold;">AGGIUNGI</button>
                </div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" style="width: 100%; color: #ef4444; font-weight: bold; border: none; background: none; padding: 40px 0;">RESET TOTALE DATI</button>
        </div>
    </div>

    <nav class="navbar">
        <button onclick="tab('home')" id="btn-home" class="nav-btn active">📊</button>
        <button onclick="tab('set')" id="btn-set" class="nav-btn">⚙️</button>
    </nav>

    <script>
        const months = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
        const kw = { 'spesa':'Spesa','esselunga':'Spesa','conad':'Spesa','macellaio':'Spesa','bolletta':'Casa','affitto':'Casa','fibra':'Casa','nido':'Riccardo' };
        
        let db = {
            t: JSON.parse(localStorage.getItem('f_v26_t')) || [],
            q: JSON.parse(localStorage.getItem('f_v26_q')) || [{l:'Casa', a:600}, {l:'Fibra', a:30}],
            c: JSON.parse(localStorage.getItem('f_v26_c')) || ["Casa", "Spesa", "Riccardo", "Svago", "Lavoro"]
        };
        let curM = new Date().getMonth(), curY = new Date().getFullYear();
        let myChart = null;

        function tab(p) {
            document.getElementById('page-home').classList.toggle('hidden', p !== 'home');
            document.getElementById('page-set').classList.toggle('hidden', p !== 'set');
            document.getElementById('btn-home').classList.toggle('active', p === 'home');
            document.getElementById('btn-set').classList.toggle('active', p === 'set');
            if(p === 'home') render(); else renderSet();
        }

        function predict(v) {
            const val = v.toLowerCase();
            const sel = document.getElementById('cat');
            for(let k in kw) { if(val.includes(k)) { sel.value = kw[k]; break; } }
        }

        function save(type) {
            const a = document.getElementById('amt').value, d = document.getElementById('dsc').value;
            if(!a || !d) return alert("Inserisci importo e descrizione");
            db.t.unshift({ id: Date.now(), a: parseFloat(a), d: d, c: document.getElementById('cat').value, u: document.getElementById('usr').value, t: type, dt: new Date().toISOString() });
            localStorage.setItem('f_v26_t', JSON.stringify(db.t));
            document.getElementById('amt').value = ''; document.getElementById('dsc').value = '';
            render();
        }

        function renderSet() {
            document.getElementById('set-quick').innerHTML = db.q.map((s,i) => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 14px; font-weight: bold;">
                    <span>${s.l} - €${s.a}</span>
                    <button onclick="db.q.splice(${i},1); localStorage.setItem('f_v26_q', JSON.stringify(db.q)); renderSet()" style="color: #ef4444; border: none; background: none; font-size: 18px;">✕</button>
                </div>
            `).join('');
        }

        function addQ() {
            const l = document.getElementById('new-q-l').value, a = document.getElementById('new-q-a').value;
            if(!l || !a) return;
            db.q.push({l, a: parseFloat(a)});
            localStorage.setItem('f_v26_q', JSON.stringify(db.q));
            document.getElementById('new-q-l').value = ''; document.getElementById('new-q-a').value = '';
            renderSet();
        }

        function render() {
            document.getElementById('cat').innerHTML = db.c.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('quick-actions').innerHTML = db.q.map(s => `
                <div onclick="document.getElementById('amt').value=${s.a}; document.getElementById('dsc').value='${s.l}'; predict('${s.l}'); save('exp')" style="background: white; padding: 15px 25px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); flex-shrink: 0; text-align: center; border: 1px solid #f1f5f9;">
                    <p style="font-size: 8px; color: #6366f1; text-transform: uppercase; font-weight: 800; margin: 0;">${s.l}</p>
                    <p style="font-size: 16px; font-weight: 800; margin: 0;">€${s.a}</p>
                </div>
            `).join('');

            const filtered = db.t.filter(x => {
                const d = new Date(x.dt);
                return d.getMonth() === curM && d.getFullYear() === curY;
            });

            const tot = db.t.reduce((s,x) => x.t === 'inc' ? s + x.a : s - x.a, 0);
            const inc = filtered.filter(x => x.t === 'inc').reduce((s,x) => s + x.a, 0);
            const exp = filtered.filter(x => x.t === 'exp').reduce((s,x) => s + x.a, 0);

            document.getElementById('total-bal').innerText = `€ ${tot.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('m-inc').innerText = `+ €${inc}`;
            document.getElementById('m-exp').innerText = `- €${exp}`;

            document.getElementById('list').innerHTML = filtered.map(x => `
                <div class="card" style="display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px;">
                    <div><p style="font-weight: 800; margin: 0; font-size: 14px;">${x.d}</p><p style="font-size: 9px; color: #94a3b8; text-transform: uppercase; margin: 0;">${x.u} • ${x.c}</p></div>
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <span style="font-weight: 800; color: ${x.t==='inc'?'#10b981':'#ef4444'}">€${x.a.toFixed(2)}</span>
                        <button onclick="db.t = db.t.filter(i => i.id !== ${x.id}); localStorage.setItem('f_v26_t', JSON.stringify(db.t)); render()" style="color: #cbd5e1; border: none; background: none; font-size: 20px;">✕</button>
                    </div>
                </div>
            `).join('');

            try {
                const cats = [...new Set(filtered.filter(x => x.t === 'exp').map(x => x.c))];
                const vals = cats.map(c => filtered.filter(x => x.c === c && x.t === 'exp').reduce((s,x) => s + x.a, 0));
                const ctx = document.getElementById('chartPie').getContext('2d');
                if(myChart) myChart.destroy();
                if(cats.length > 0) {
                    myChart = new Chart(ctx, { type: 'doughnut', data: { labels: cats, datasets: [{ data: vals, backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899'] }] }, options: { plugins: { legend: { position: 'bottom' } } } });
                }
            } catch(e) {}
        }

        function changeDate() {
            curM = parseInt(document.getElementById('m-sel').value);
            curY = parseInt(document.getElementById('y-sel').value);
            render();
        }

        window.onload = () => {
            const mS = document.getElementById('m-sel'), yS = document.getElementById('y-sel');
            months.forEach((m, i) => mS.innerHTML += `<option value="${i}" ${i === curM ? 'selected' : ''}>${m}</option>`);
            for(let y = curY - 1; y <= curY + 1; y++) yS.innerHTML += `<option value="${y}" ${y === curY ? 'selected' : ''}>${y}</option>`;
            render();
        };
    </script>
</body>
</html>
