<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wallet Famiglia</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            padding-bottom: 110px; 
            background: #FFFFFF; 
            color: #191C1F;
        }

        .hidden { display: none !important; }

        /* Revolut inputs: grigio chiaro che diventa bianco con bordo blu al focus */
        input, select {
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        input:focus, select:focus {
            background-color: #FFFFFF !important;
            border-color: #0075EB !important;
            outline: none;
            box-shadow: 0 0 0 1px #0075EB;
        }

        .nav-active { color: #0075EB; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes flash-inc { 0% { background: #ECFDF5; } 100% { background: white; } }
        @keyframes flash-exp { 0% { background: #FEF2F2; } 100% { background: white; } }
        .flash-inc { animation: flash-inc 0.8s ease-out; }
        .flash-exp { animation: flash-exp 0.8s ease-out; }
    </style>
</head>
<body class="min-h-screen">

    <div id="page-dashboard" class="max-w-xl mx-auto px-5 pt-8">
        <div class="flex justify-between items-center mb-10 text-left">
            <div>
                <p class="text-xs text-slate-500 font-medium">Conto Principale</p>
                <h1 class="text-2xl font-bold text-slate-950 tracking-tighter">Wallet</h1>
            </div>
            <div class="flex gap-2">
                <select id="month-select" onchange="updateDateFilter()" class="bg-slate-100 px-3 py-2 rounded-full text-xs font-semibold text-slate-700 cursor-pointer"></select>
                <select id="year-select" onchange="updateDateFilter()" class="bg-slate-100 px-3 py-2 rounded-full text-xs font-semibold text-slate-700 cursor-pointer"></select>
            </div>
        </div>

        <div class="mb-10 text-center">
            <p id="total-balance" class="text-5xl font-extrabold tracking-tighter text-slate-950">€ 0,00</p>
            <p id="date-label" class="text-xs text-slate-500 font-medium mt-1 tracking-wide"></p>
        </div>

        <div class="flex justify-around items-center gap-4 border border-slate-100 p-5 rounded-3xl mb-10 shadow-[0_4px_20px_rgba(0,0,0,0.03)] bg-white">
            <div class="text-center flex-1">
                <p class="text-slate-500 text-[10px] uppercase font-bold mb-1 tracking-widest">Entrate</p>
                <p id="m-inc" class="font-bold text-emerald-600 text-lg">+ €0</p>
            </div>
            <div class="w-px h-10 bg-slate-200"></div>
            <div class="text-center flex-1">
                <p class="text-slate-500 text-[10px] uppercase font-bold mb-1 tracking-widest">Uscite</p>
                <p id="m-exp" class="font-bold text-rose-600 text-lg">- €0</p>
            </div>
        </div>

        <div class="mb-10 overflow-x-auto whitespace-nowrap pb-2 no-scrollbar scroll-smooth">
            <div id="quick-actions-container" class="flex gap-2"></div>
        </div>

        <div id="input-card" class="bg-white rounded-3xl p-6 border border-slate-100 shadow-[0_8px_30px_rgba(0,0,0,0.06)] mb-10 space-y-4 relative transition-all">
            <div id="ai-badge" class="hidden absolute top-4 right-6 text-[9px] font-bold bg-slate-100 text-[#0075EB] px-2 py-1 rounded-md uppercase tracking-tighter">AI AUTOMATION</div>
            <div class="flex gap-2">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-slate-100 rounded-xl p-4 font-bold text-2xl">
                <select id="usr" class="w-1/2 bg-slate-100 rounded-xl p-4 text-xs font-bold text-[#0075EB] appearance-none">
                    <option value="Stany">Stany</option>
                    <option value="Giulia">Giulia</option>
                </select>
            </div>
            <input type="text" id="dsc" oninput="predictCategory(this.value)" placeholder="Cosa hai comprato?" class="w-full bg-slate-100 rounded-xl p-4 text-sm font-medium">
            <select id="cat" class="w-full bg-slate-100 rounded-xl p-4 text-sm font-semibold text-slate-700 appearance-none"></select>
            <div class="flex gap-3 pt-2">
                <button onclick="save('exp')" class="flex-1 bg-[#0075EB] text-white py-4 rounded-xl font-bold text-xs uppercase tracking-wider active:scale-95 transition-transform">- Speso</button>
                <button onclick="save('inc')" class="flex-1 bg-slate-100 text-slate-900 py-4 rounded-xl font-bold text-xs uppercase tracking-wider active:scale-95 transition-transform">+ Ricevuto</button>
            </div>
        </div>

        <div id="charts-container" class="bg-white rounded-3xl p-6 mb-10 border border-slate-100 shadow-[0_4px_20px_rgba(0,0,0,0.03)] space-y-8">
            <canvas id="chartPie" class="max-h-48 mx-auto"></canvas>
            <div class="pt-8 border-t border-slate-100"><canvas id="chartLine" class="max-h-40 mx-auto"></canvas></div>
        </div>
        
        <div class="mb-5"><h3 class="text-sm font-semibold text-slate-500">Transazioni Recenti</h3></div>
        <div id="list" class="space-y-3 pb-20 text-left"></div>
    </div>

    <div id="page-settings" class="max-w-xl mx-auto px-6 pt-8 hidden text-center">
        <h1 class="text-2xl font-bold text-slate-950 mb-10 tracking-tighter">Opzioni</h1>
        <div class="space-y-8 pb-10 text-left">
            <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-[0_4px_20px_rgba(0,0,0,0.03)]">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-6 tracking-widest text-center">Tasti Rapidi</p>
                <div id="settings-quick-list" class="space-y-3 mb-6"></div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
                    <input type="text" id="new-q-label" placeholder="Etichetta (es. Caffè)" class="w-full p-3 rounded-lg text-sm bg-slate-100">
                    <div class="flex gap-2">
                        <input type="number" id="new-q-amt" placeholder="€" class="w-1/2 p-3 rounded-lg bg-slate-100 font-semibold">
                        <select id="new-q-type" class="w-1/2 p-3 rounded-lg bg-slate-100 font-semibold">
                            <option value="exp">Uscita</option>
                            <option value="inc">Entrata</option>
                        </select>
                    </div>
                    <button onclick="addQuickSetting()" class="w-full bg-[#0075EB] text-white py-3 rounded-lg font-bold uppercase text-[10px] tracking-wide active:opacity-80">Aggiungi Tasto</button>
                </div>
            </div>
            
            <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-[0_4px_20px_rgba(0,0,0,0.03)] text-center">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-6 tracking-widest">Categorie</p>
                <div id="settings-cat-list" class="space-y-2 mb-6 text-xs font-semibold uppercase text-slate-700"></div>
                <div class="flex gap-2">
                    <input type="text" id="new-cat-name" placeholder="Nuova Categoria..." class="flex-1 bg-slate-100 rounded-xl p-3 text-sm font-medium">
                    <button onclick="addCategory()" class="bg-slate-900 text-white px-5 rounded-xl font-bold active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                        </svg>
                    </button>
                </div>
            </div>

            <button onclick="clearAllData()" class="w-full text-rose-600 text-xs font-bold uppercase py-10 opacity-60 tracking-wider text-center">Resetta Applicazione</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white h-24 flex items-start justify-around z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.04)] border-t border-slate-100 px-6 pt-4">
        <button onclick="switchTab('dashboard')" id="btn-dash" class="flex flex-col items-center gap-1.5 nav-active transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.59
