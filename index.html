<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanze Famiglia</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; padding-bottom: 120px; background: #f8fafc; }
        .hidden { display: none !important; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .nav-active { color: #6366f1; transform: scale(1.05); font-weight: 800; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes flash-inc { 0% { background: #f0fdf4; } 100% { background: white; } }
        @keyframes flash-exp { 0% { background: #fef2f2; } 100% { background: white; } }
        .flash-inc { animation: flash-inc 0.8s ease-out; }
        .flash-exp { animation: flash-exp 0.8s ease-out; }
        .progress-bar { height: 6px; border-radius: 10px; background: #f1f5f9; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }
    </style>
</head>
<body class="min-h-screen">

    <div id="page-dashboard" class="max-w-md mx-auto px-5 pt-12">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight italic">Wallet</h1>
                <p id="date-label" class="text-indigo-500 font-bold text-[10px] uppercase mt-1 tracking-widest"></p>
            </div>
            <div class="flex gap-2">
                <select id="month-select" onchange="updateDateFilter()" class="glass-card px-2 py-2 rounded-xl text-[10px] font-black uppercase outline-none text-slate-500"></select>
                <select id="year-select" onchange="updateDateFilter()" class="glass-card px-2 py-2 rounded-xl text-[10px] font-black uppercase outline-none text-slate-500"></select>
            </div>
        </div>

        <div class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl mb-8 relative overflow-hidden text-center">
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2 italic">Patrimonio Totale</p>
            <h2 id="total-balance" class="text-4xl font-extrabold tracking-tighter mb-6 italic">€ 0,00</h2>
            <div class="flex justify-around items-center gap-4 bg-white/5 p-4 rounded-3xl backdrop-blur-md">
                <div class="text-center">
                    <p class="text-slate-500 text-[9px] uppercase font-bold mb-1">Entrate</p>
                    <p id="m-inc" class="font-extrabold text-emerald-400 text-base">€ 0</p>
                </div>
                <div class="text-center">
                    <p class="text-slate-500 text-[9px] uppercase font-bold mb-1">Uscite</p>
                    <p id="m-exp" class="font-extrabold text-rose-400 text-base">€ 0</p>
                </div>
            </div>
        </div>

        <div class="mb-8 overflow-x-auto whitespace-nowrap pb-2 no-scrollbar"><div id="quick-actions-container" class="flex gap-3"></div></div>

        <div id="input-card" class="glass-card rounded-[2.5rem] p-6 shadow-xl mb-10 space-y-4 border border-white relative transition-all">
            <div id="ai-badge" class="hidden absolute top-4 right-6 text-[8px] font-black bg-indigo-100 text-indigo-600 px-2 py-1 rounded">AI</div>
            <div class="flex gap-2">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-slate-100/50 rounded-2xl p-4 font-extrabold text-xl outline-none">
                <select id="usr" class="w-1/2 bg-slate-100/50 rounded-2xl p-4 text-xs font-bold text-indigo-600 outline-none">
                    <option value="Stany">Stany</option>
                    <option value="Giulia">Giulia</option>
                </select>
            </div>
            <input type="text" id="dsc" oninput="predictCategory(this.value)" placeholder="Cosa hai comprato?" class="w-full bg-slate-100/50 rounded-2xl p-4 text-sm outline-none font-medium">
            <select id="cat" class="w-full bg-slate-100/50 rounded-2xl p-4 text-sm font-bold text-slate-600 outline-none appearance-none"></select>
            <div class="flex gap-3 pt-2">
                <button onclick="save('inc')" class="flex-1 bg-slate-900 text-emerald-400 py-4 rounded-2xl font-extrabold text-[10px] uppercase tracking-widest">+ In</button>
                <button onclick="save('exp')" class="flex-1 bg-slate-900 text-rose-400 py-4 rounded-2xl font-extrabold text-[10px] uppercase tracking-widest">- Out</button>
            </div>
        </div>

        <div class="space-y-6">
            <div class="glass-card rounded-[2.5rem] p-7 shadow-sm border border-white">
                <p class="text-slate-400 font-bold text-[9px] uppercase tracking-widest text-center mb-6">Spese per Categoria</p>
                <canvas id="chartPie" class="max-h-48 mx-auto mb-8"></canvas>
                <div id="category-table" class="space-y-4"></div>
            </div>

            <div class="glass-card rounded-[2.5rem] p-7 shadow-sm border border-white">
                <canvas id="chartLine" class="max-h-60 mx-auto"></canvas>
            </div>
        </div>
        
        <div id="list" class="space-y-4 py-10"></div>
    </div>

    <div id="page-settings" class="max-w-md mx-auto px-6 pt-12 hidden">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-10 text-center italic">Opzioni</h1>
        <div class="space-y-8 pb-10">
            <div class="glass-card rounded-[2.5rem] p-6 shadow-sm border border-white">
                <p class="text-[10px] font-black text-indigo-500 uppercase mb-6 tracking-widest text-center">Tasti Rapidi</p>
                <div id="settings-quick-list" class="space-y-3 mb-6 text-xs font-bold uppercase"></div>
                <div class="bg-slate-100/50 p-4 rounded-3xl space-y-3">
                    <input type="text" id="new-q-label" placeholder="Etichetta" class="w-full p-3 rounded-xl outline-none text-sm">
                    <div class="flex gap-2">
                        <input type="number" id="new-q-amt" placeholder="€" class="w-1/2 p-3 rounded-xl font-bold">
                        <select id="new-q-type" class="w-1/2 p-3 rounded-xl font-bold"><option value="exp">Uscita</option><option value="inc">Entrata</option></select>
                    </div>
                    <button onclick="addQuickSetting()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold uppercase text-[10px]">+ Aggiungi</button>
                </div>
            </div>
            <button onclick="clearAllData()" class="w-full text-rose-300 text-[10px] font-black uppercase py-10 opacity-40">Resetta App</button>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 bg-slate-900 h-20 rounded-[2rem] flex items-center justify-around z-50 shadow-2xl border border-white/10">
        <button onclick="switchTab('dashboard')" id="btn-dash" class="flex flex-col items-center gap-1 nav-active transition-all"><span class="text-xl">📊</span><span class="text-[8px] uppercase font-black">Home</span></button>
        <button onclick="switchTab('settings')" id="btn-set" class="flex flex-col items-center gap-1 text-slate-500 transition-all"><span class="text-xl">⚙️</span><span class="text-[8px] uppercase font-black">Set</span></button>
    </nav>

    <script>
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const catColors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6'];
        const kwMap = { 'spesa':'Spesa','esselunga':'Spesa','conad':'Spesa','macellaio':'Spesa','verdura':'Spesa','bolletta':'Casa','affitto':'Casa','stipendio':'Lavoro','nido':'Riccardo','pannolini':'Riccardo' };

        let transactions = JSON.parse(localStorage.getItem('fin_v23_trans')) || [];
        let quickSettings = JSON.parse(localStorage.getItem('fin_v23_quick')) || [{ label: 'Casa', amt: 600, type: 'exp' }, { label: 'Fibra', amt: 30, type: 'exp' }, { label: 'Stipendio', amt: 1800, type: 'inc' }];
        let categories = JSON.parse(localStorage.getItem('fin_v23_cats')) || ["Casa", "Spesa", "Riccardo", "Svago", "Lavoro", "Mezzi"];
        
        const now = new Date();
        let currentMonth = now.getMonth(), currentYear = now.getFullYear();
        let charts = { pie: null, line: null };

        function vibrate() { if (window.navigator?.vibrate) window.navigator.vibrate(30); }

        function predictCategory(t) {
            const v = t.toLowerCase(), b = document.getElementById('ai-badge'), s = document.getElementById('cat');
            let found = false;
            for (let k in kwMap) { if (v.includes(k)) { s.value = kwMap[k]; found = true; break; } }
            b.classList.toggle('hidden', !found);
        }

        function switchTab(p) {
            vibrate();
            document.getElementById('page-dashboard').classList.toggle('hidden', p !== 'dashboard');
            document.getElementById('page-settings').classList.toggle('hidden', p !== 'settings');
            document.getElementById('btn-dash').classList.toggle('nav-active', p === 'dashboard');
            document.getElementById('btn-set').classList.toggle('nav-active', p === 'settings');
            if(p === 'dashboard') render(); else renderSettingsPage();
        }

        function renderSettingsPage() {
            document.getElementById('settings-quick-list').innerHTML = quickSettings.map((s, i) => `<div class="flex items-center gap-3 bg-slate-100/50 p-3 rounded-2xl border border-slate-100 uppercase">
                <div class="flex-1">${s.label} - €${s.amt}</div><button onclick="quickSettings.splice(${i},1); localStorage.setItem('fin_v23_quick', JSON.stringify(quickSettings)); renderSettingsPage()" class="text-rose-400">✕</button></div>`).join('');
        }

        function updateDateFilter() {
            currentMonth = parseInt(document.getElementById('month-select').value);
            currentYear = parseInt(document.getElementById('year-select').value);
            render();
        }

        function render() {
            const catS = document.getElementById('cat');
            catS.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('quick-actions-container').innerHTML = quickSettings.map(s => `<button onclick="document.getElementById('amt').value=${s.amt}; document.getElementById('dsc').value='${s.label}'; predictCategory('${s.label}'); save('${s.type}')" class="glass-card px-6 py-4 rounded-[2rem] shadow-sm shrink-0 active:scale-95 transition-all text-center"><p class="text-[9px] font-black uppercase text-indigo-500 mb-1 italic">${s.label}</p><p class="text-sm font-black">€${s.amt}</p></button>`).join('');

            const filtered = transactions.filter(t => { const d = new Date(t.date); return d.getMonth() === currentMonth && d.getFullYear() === currentYear; });
            const total = transactions.reduce((s, t) => t.type === 'inc' ? s + t.amt : s - t.amt, 0);
            const mInc = filtered.filter(t => t.type === 'inc').reduce((s, t) => s + t.amt, 0);
            const mExp = filtered.filter(t => t.type === 'exp').reduce((s, t) => s + t.amt, 0);

            document.getElementById('date-label').innerText = `${monthNames[currentMonth]} ${currentYear}`;
            document.getElementById('total-balance').innerText = `€ ${total.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('m-inc').innerText = `+ €${mInc.toFixed(0)}`;
            document.getElementById('m-exp').innerText = `- €${mExp.toFixed(0)}`;

            document.getElementById('list').innerHTML = filtered.map(t => `<div class="glass-card p-4 rounded-[2rem] flex justify-between items-center border border-white mb-3 text-sm">
                <div class="truncate flex-1 pr-4"><p class="font-extrabold truncate italic">${t.dsc}</p><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${t.usr} • ${t.cat}</p></div>
                <div class="flex items-center gap-3"><p class="font-black ${t.type === 'inc' ? 'text-emerald-500' : 'text-rose-500'} italic">€${t.amt.toFixed(2)}</p><button onclick="transactions = transactions.filter(x => x.id !== ${t.id}); localStorage.setItem('fin_v23_trans', JSON.stringify(transactions)); render()" class="text-slate-200 font-bold px-1 text-lg">✕</button></div></div>`).join('');
            
            setTimeout(() => { try { updateCharts(filtered); } catch(e) {} }, 100);
        }

        function save(type) {
            const a = document.getElementById('amt').value, d = document.getElementById('dsc').value;
            if(!a || !d) return alert("Dati mancanti!");
            vibrate();
            transactions.unshift({ id: Date.now(), amt: parseFloat(a), dsc: d, cat: document.getElementById('cat').value, usr: document.getElementById('usr').value, type: type, date: new Date().toISOString() });
            localStorage.
