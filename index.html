<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanze Famiglia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; padding-bottom: 100px; font-family: sans-serif; }
        .hidden { display: none !important; }
        .nav-active { color: #6366f1; transform: scale(1.1); font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="page-dashboard" class="max-w-md mx-auto px-4 pt-6">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black text-slate-800">Finanze Famiglia</h1>
                <p id="month-label" class="text-indigo-600 font-bold uppercase text-[10px] tracking-widest"></p>
            </div>
            <select id="month-select" onchange="updateMonth(this.value)" class="bg-white p-2 rounded-lg shadow-sm border border-slate-200 text-[10px] font-bold uppercase outline-none"></select>
        </div>

        <div class="bg-indigo-600 rounded-[2rem] p-6 text-white shadow-xl mb-6">
            <h2 id="total-balance" class="text-4xl font-black text-center mb-4">€ 0.00</h2>
            <div class="grid grid-cols-2 gap-4 border-t border-indigo-400/50 pt-4 text-center text-sm">
                <div><p class="text-indigo-200 text-[9px] uppercase">Entrate Mese</p><p id="m-inc" class="font-bold text-emerald-300">€ 0.00</p></div>
                <div><p class="text-indigo-200 text-[9px] uppercase">Uscite Mese</p><p id="m-exp" class="font-bold text-rose-300">€ 0.00</p></div>
            </div>
        </div>

        <div class="mb-6 overflow-x-auto whitespace-nowrap pb-2 no-scrollbar">
            <div id="quick-actions-container" class="flex gap-2"></div>
        </div>

        <div class="bg-white rounded-[2rem] p-6 shadow-md mb-6 space-y-4 border border-slate-100">
            <div class="flex gap-2">
                <input type="number" id="amt" placeholder="0.00" class="w-1/2 bg-slate-50 rounded-2xl p-4 font-bold text-lg outline-none">
                <select id="usr" class="w-1/2 bg-slate-50 rounded-2xl p-4 text-sm font-bold text-indigo-600 outline-none">
                    <option value="Stany">Stany</option>
                    <option value="Giulia">Giulia</option>
                </select>
            </div>
            <input type="text" id="dsc" placeholder="Cosa hai comprato?" class="w-full bg-slate-50 rounded-2xl p-4 outline-none">
            <select id="cat" class="w-full bg-slate-50 rounded-2xl p-4 outline-none text-slate-600 font-medium"></select>
            <div class="flex gap-3 pt-2">
                <button onclick="save('inc')" class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl font-bold shadow-lg">+ ENTRATA</button>
                <button onclick="save('exp')" class="flex-1 bg-rose-500 text-white py-4 rounded-2xl font-bold shadow-lg">- USCITA</button>
            </div>
        </div>

        <div id="charts-area" class="bg-white rounded-[2rem] p-6 shadow-md mb-6 space-y-8">
            <canvas id="chartPie" class="max-h-48 mx-auto"></canvas>
            <canvas id="chartLine" class="max-h-40 mx-auto"></canvas>
        </div>

        <div id="list" class="space-y-3"></div>
    </div>

    <div id="page-settings" class="max-w-md mx-auto px-4 pt-6 hidden">
        <h1 class="text-2xl font-black text-slate-800 mb-6">Impostazioni</h1>
        
        <div class="space-y-6">
            <div class="bg-white rounded-[2rem] p-6 shadow-md border border-slate-100">
                <p class="text-[10px] font-bold text-indigo-600 uppercase mb-4 tracking-widest text-center">Importi Tasti Rapidi</p>
                <div id="settings-quick-list" class="space-y-4 mb-4"></div>
                <button onclick="saveSettings()" class="w-full bg-slate-800 text-white py-3 rounded-xl text-sm font-bold uppercase">Salva Importi</button>
            </div>

            <div class="bg-white rounded-[2rem] p-6 shadow-md border border-slate-100">
                <p class="text-[10px] font-bold text-indigo-600 uppercase mb-4 tracking-widest text-center">Gestione Categorie</p>
                <div id="settings-cat-list" class="space-y-2 mb-4"></div>
                <div class="flex gap-2 border-t pt-4">
                    <input type="text" id="new-cat-name" placeholder="Es: 🍎 Cibo" class="flex-1 bg-slate-50 rounded-lg p-3 text-sm outline-none">
                    <button onclick="addCategory()" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold">+</button>
                </div>
            </div>

            <button onclick="clearAllData()" class="w-full text-rose-300 text-[10px] font-bold uppercase py-10 tracking-widest">Reset Totale App</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 h-20 flex items-center justify-around z-50">
        <button onclick="switchTab('dashboard')" id="btn-dash" class="flex flex-col items-center gap-1 nav-active">
            <span class="text-2xl">📊</span><span class="text-[10px] uppercase">Home</span>
        </button>
        <button onclick="switchTab('settings')" id="btn-set" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-2xl">⚙️</span><span class="text-[10px] uppercase">Set</span>
        </button>
    </nav>

    <script>
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        
        let transactions = JSON.parse(localStorage.getItem('fin_trans_v8')) || [];
        let quickSettings = JSON.parse(localStorage.getItem('fin_quick_v8')) || [
            { label: '🏠 Pagamento Casa', amt: 600, type: 'exp' },
            { label: '🌐 Fibra casa', amt: 30, type: 'exp' },
            { label: '💰 Stipendio Stany', amt: 1800, type: 'inc' }
        ];
        let categories = JSON.parse(localStorage.getItem('fin_cats_v8')) || [
            "🏠 Casa", "🛒 Spesa", "👶 Riccardo", "🍕 Tortellini", "🚗 Mezzi", "💰 Lavoro", "📱 Varie"
        ];

        let currentMonth = new Date().getMonth();
        let pieChart = null, lineChart = null;

        function switchTab(page) {
            document.getElementById('page-dashboard').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('page-settings').classList.toggle('hidden', page !== 'settings');
            document.getElementById('btn-dash').classList.toggle('nav-active', page === 'dashboard');
            document.getElementById('btn-set').classList.toggle('nav-active', page === 'settings');
            if(page === 'dashboard') render();
            if(page === 'settings') renderSettingsPage();
        }

        function renderSettingsPage() {
            const qList = document.getElementById('settings-quick-list');
            qList.innerHTML = quickSettings.map((s, i) => `
                <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl">
                    <span class="text-[11px] font-bold text-slate-500 flex-1">${s.label}</span>
                    <input type="number" id="set-amt-${i}" value="${s.amt}" class="w-24 p-2 rounded-lg border border-slate-200 text-right font-bold text-sm">
                </div>
            `).join('');

            const cList = document.getElementById('settings-cat-list');
            cList.innerHTML = categories.map((c, i) => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                    <span class="text-sm font-medium text-slate-700">${c}</span>
                    <button onclick="removeCategory(${i})" class="text-rose-500 font-bold px-2">✕</button>
                </div>
            `).join('');
        }

        function saveSettings() {
            quickSettings.forEach((s, i) => {
                s.amt = parseFloat(document.getElementById(`set-amt-${i}`).value) || 0;
            });
            localStorage.setItem('fin_quick_v8', JSON.stringify(quickSettings));
            alert("Salvato!");
            switchTab('dashboard');
        }

        function addCategory() {
            const val = document.getElementById('new-cat-name').value.trim();
            if(!val) return;
            categories.push(val);
            localStorage.setItem('fin_cats_v8', JSON.stringify(categories));
            document.getElementById('new-cat-name').value = '';
            renderSettingsPage();
        }

        function removeCategory(i) {
            if(confirm("Eliminare categoria?")) {
                categories.splice(i, 1);
                localStorage.setItem('fin_cats_v8', JSON.stringify(categories));
                renderSettingsPage();
            }
        }

        function render() {
            document.getElementById('cat').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('quick-actions-container').innerHTML = quickSettings.map(s => `
                <button onclick="addQuick('${s.label}', ${s.amt}, '${s.type}')" class="bg-white px-4 py-3 rounded-2xl shadow-sm text-[11px] font-bold border border-slate-100 shrink-0">
                    <span class="text-indigo-600">${s.label.split(' ')[0]}</span> ${s.amt}€
                </button>
            `).join('');

            const filtered = transactions.filter(t => new Date(t.date).getMonth() === currentMonth);
            const total = transactions.reduce((s, t) => t.type === 'inc' ? s + t.amt : s - t.amt, 0);
            const mInc = filtered.filter(t => t.type === 'inc').reduce((s, t) => s + t.amt, 0);
            const mExp = filtered.filter(t => t.type === 'exp').reduce((s, t) => s + t.amt, 0);

            document.getElementById('month-label').innerText = monthNames[currentMonth];
            document.getElementById('total-balance').innerText = `€ ${total.toLocaleString('it-IT')}`;
            document.getElementById('m-inc').innerText = `+ €${mInc.toFixed(2)}`;
            document.getElementById('m-exp').innerText = `- €${mExp.toFixed(2)}`;

            document.getElementById('list').innerHTML = filtered.map(t => `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-slate-50">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="text-xl flex-shrink-0">${t.cat.split(' ')[0]}</div>
                        <div class="truncate">
                            <p class="font-bold text-slate-800 text-sm truncate">${t.dsc}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">${t.usr} • ${new Date(t.date).toLocaleDateString('it-IT')}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <p class="font-black ${t.type === 'inc' ? 'text-emerald-500' : 'text-rose-500'} whitespace-nowrap text-sm">
                            ${t.type === 'inc' ? '+' : '-'} €${t.amt.toFixed(2)}
                        </p>
                        <button onclick="deleteEntry(${t.id})" class="text-rose-300 hover:text-rose-500 px-1 font-bold">✕</button>
                    </div>
                </div>
            `).join('');
            
            updateCharts(filtered);
        }

        function deleteEntry(id) {
            if(confirm("Vuoi eliminare questa spesa?")) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('fin_trans_v8', JSON.stringify(transactions));
                render();
            }
        }

        function addQuick(label, amt, type) {
            document.getElementById('amt').value = amt;
            document.getElementById('dsc').value = label;
            save(type);
        }

        function save(type) {
            const a = document.getElementById('amt').value;
            const d = document.getElementById('dsc').value;
            if(!a || !d) return alert("Inserisci i dati");

            transactions.unshift({
                id: Date.now(), amt: parseFloat(a), dsc: d,
                cat: document.getElementById('cat').value,
                usr: document.getElementById('usr').value,
                type: type, date: new Date().toISOString()
            });

            localStorage.setItem('fin_trans_v8', JSON.stringify(transactions));
            document.getElementById('amt').value = '';
            document.getElementById('dsc').value = '';
            render();
        }

        function updateCharts(data) {
            const exp = data.filter(t => t.type === 'exp');
            const cats = [...new Set(exp.map(t => t.cat))];
            const pData = cats.map(c => exp.filter(t => t.cat === c).reduce((s, t) => s + t.amt, 0));

            if(pieChart) pieChart.destroy();
            pieChart = new Chart(document.getElementById('chartPie').getContext('2d'), {
                type: 'doughnut',
                data: { labels: cats, datasets: [{ data: pData, backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#ec4899'], borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '75%' }
            });

            const last6 = [];
            for(let i = 5; i >= 0; i--) last6.push((new Date().getMonth() - i + 12) % 12);
            const lData = last6.map(m => transactions.filter(t => new Date(t.date).getMonth() === m && t.type === 'exp').reduce((s, t) => s + t.amt, 0));

            if(lineChart) lineChart.destroy();
            lineChart = new Chart(document.getElementById('chartLine').getContext('2d'), {
                type: 'line',
                data: {
                    labels: last6.map(m => monthNames[m].substring(0,3)),
                    datasets: [{ borderColor: '#6366f1', data: lData, tension: 0.4, fill: true, backgroundColor: 'rgba(99, 102, 241, 0.05)' }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        const mSel = document.getElementById('month-select');
        monthNames.forEach((m, i) => { mSel.innerHTML += `<option value="${i}" ${i === currentMonth ? 'selected' : ''}>${m.substring(0,3)}</option>`; });
        function updateMonth(v) { currentMonth = parseInt(v); render(); }
        function clearAllData() { if(confirm("Resettare tutto?")) { localStorage.clear(); location.reload(); } }

        window.onload = () => render();
    </script>
</body>
</html>
