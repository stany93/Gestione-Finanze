<!DOCTYPE html>

<head>

    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#0075EB' } } }
        }
        if (localStorage.getItem('fin_theme') === 'dark' || (!('fin_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        const appManifest = {
            "name": "Wallet Famiglia",
            "short_name": "Wallet",
            "start_url": window.location.href.split('?')[0],
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#0075EB",
            "icons": [{
                "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%230075eb'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' fill='%23fff' font-family='sans-serif' font-weight='bold' font-size='260' dy='.35em'%3EW%3C/text%3E%3C/svg%3E",
                "sizes": "512x512",
                "type": "image/svg+xml",
                "purpose": "any maskable"
            }]
        };
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(appManifest));
        document.head.appendChild(manifestLink);
        
        const appleIcon = document.createElement('link');
        appleIcon.rel = 'apple-touch-icon';
        appleIcon.href = appManifest.icons[0].src;
        document.head.appendChild(appleIcon);
    </script>

    <!-- FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCX6bNXQMKS_a0fIKga_nY07Jy9oJ8XiiI",
            authDomain: "wallet-famiglia.firebaseapp.com",
            projectId: "wallet-famiglia",
            storageBucket: "wallet-famiglia.firebasestorage.app",
            messagingSenderId: "909534951887",
            appId: "1:909534951887:web:3c3c4f5427ce3f2632baba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const q = query(collection(db, "transactions"), orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            window.sharedTransactions = [];
            snapshot.forEach((doc) => { window.sharedTransactions.push({ id: doc.id, ...doc.data() }); });
            if (window.currentAccount === 'shared') {
                window.transactions = [...window.sharedTransactions];
                window.render();
            }
        });

        window.save = async function(type) {
            const a = document.getElementById('amt').value, d = document.getElementById('dsc').value;
            if(!a || !d) { 
                window.confirmAction("Inserisci importo e descrizione.", () => {}, true);
                return;
            }
            window.vibrate();
            const newTx = { amt: parseFloat(a), dsc: d, cat: document.getElementById('cat').value, usr: document.getElementById('usr').value, type, date: new Date().toISOString() };

            if (window.currentAccount === 'shared') {
                await addDoc(collection(db, "transactions"), newTx);
            } else {
                newTx.id = Date.now().toString();
                window.transactions.unshift(newTx);
                localStorage.setItem('fin_v22_trans_' + window.currentAccount, JSON.stringify(window.transactions));
                window.render();
            }
            document.getElementById('amt').value = ''; document.getElementById('dsc').value = '';
            const card = document.getElementById('input-card');
            card.classList.add(type === 'inc' ? 'flash-inc' : 'flash-exp');
            setTimeout(() => card.classList.remove('flash-inc', 'flash-exp'), 1000);
        };

        window.deleteEntry = async function(id) {
            window.confirmAction("Eliminare la transazione?", async () => {
                if (window.currentAccount === 'shared') {
                    await deleteDoc(doc(db, "transactions", id));
                } else {
                    window.transactions = window.transactions.filter(t => t.id !== id);
                    localStorage.setItem('fin_v22_trans_' + window.currentAccount, JSON.stringify(window.transactions));
                    window.render();
                }
            });
        };
    </script>

    <!-- UI E LOGICA LOCALE -->
    <script>
        window.sharedTransactions = [];
        window.transactions = []; 
        window.currentAccount = localStorage.getItem('fin_v22_currentAccount') || 'shared';
        window.accounts = JSON.parse(localStorage.getItem('fin_v22_accounts')) || [{ id: 'shared', name: 'Conto Famiglia', type: 'cloud' }];
        
        window.switchAccount = function(id) {
            window.currentAccount = id;
            localStorage.setItem('fin_v22_currentAccount', id);
            const syncStatus = document.getElementById('sync-status');
            const accObj = window.accounts.find(a => a.id === id);
            document.getElementById('account-display-name').innerText = accObj ? accObj.name : 'Conto';
            
            if (id === 'shared') {
                window.transactions = [...window.sharedTransactions];
                syncStatus.className = 'w-2 h-2 bg-emerald-400 rounded-full animate-pulse';
            } else {
                window.transactions = JSON.parse(localStorage.getItem('fin_v22_trans_' + id)) || [];
                syncStatus.className = 'w-2 h-2 bg-slate-300 dark:bg-slate-600 rounded-full';
            }
            window.render();
        };

        window.addAccount = function() {
            const name = document.getElementById('new-account-name').value.trim();
            if(!name) return;
            const id = 'local_' + Date.now();
            window.accounts.push({ id, name, type: 'local' });
            localStorage.setItem('fin_v22_accounts', JSON.stringify(window.accounts));
            document.getElementById('new-account-name').value = '';
            window.populateAccountsDropdown();
            window.switchAccount(id);
        };

        window.populateAccountsDropdown = function() {
            const sel = document.getElementById('account-select');
            if(!sel) return;
            sel.innerHTML = window.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
            sel.value = window.currentAccount;
            const accObj = window.accounts.find(a => a.id === window.currentAccount);
            document.getElementById('account-display-name').innerText = accObj ? accObj.name : 'Conto';
        };

        window.toggleTheme = function() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('fin_theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            window.render(); 
        };

        window.confirmAction = function(message, actionCallback, isAlert = false) {
            document.getElementById('modal-message').innerText = message;
            const confirmBtn = document.getElementById('modal-confirm-btn');
            confirmBtn.style.display = isAlert ? 'none' : 'block';
            window.pendingAction = actionCallback;
            document.getElementById('custom-modal').classList.remove('hidden');
        };

        window.closeModal = function() { document.getElementById('custom-modal').classList.add('hidden'); };
        document.getElementById('modal-confirm-btn').addEventListener('click', () => { if (window.pendingAction) window.pendingAction(); window.closeModal(); });

        const monthNames = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
        const catColors = ['#0075EB', '#22C55E', '#F59E0B', '#EF4444', '#EC4899', '#8B5CF6', '#06B6D4', '#F97316', '#84CC16', '#3B82F6', '#D946EF', '#14B8A6'];
        let charts = { pie: null, line: null };

        window.render = function() {
            const catSelect = document.getElementById('cat');
            const baseCats = ["Casa", "Spesa", "Riccardo", "Svago", "Lavoro", "Gatti", "Macchina", "Cene", "Vestiti", "Vacanze", "Regali", "Salute"];
            if(catSelect) catSelect.innerHTML = baseCats.map(c => `<option value="${c}">${c}</option>`).join('');

            const now = new Date();
            const filtered = window.transactions.filter(t => {
                const d = new Date(t.date);
                return d.getMonth() === parseInt(document.getElementById('month-select').value) && d.getFullYear() === parseInt(document.getElementById('year-select').value);
            });

            const total = window.transactions.reduce((s, t) => t.type === 'inc' ? s + t.amt : s - t.amt, 0);
            const mInc = filtered.filter(t => t.type === 'inc').reduce((s, t) => s + t.amt, 0);
            const mExp = filtered.filter(t => t.type === 'exp').reduce((s, t) => s + t.amt, 0);

            document.getElementById('total-balance').innerText = `€ ${total.toLocaleString('it-IT', {minimumFractionDigits: 2})}`;
            document.getElementById('m-inc').innerText = `+ €${mInc.toFixed(0)}`;
            document.getElementById('m-exp').innerText = `- €${mExp.toFixed(0)}`;

            document.getElementById('list').innerHTML = filtered.map(t => `<div class="bg-white dark:bg-slate-900 p-4 rounded-2xl flex justify-between items-center border border-slate-200 dark:border-slate-800 shadow-sm text-sm mb-3">
                <div class="truncate flex-1 pr-4 text-left">
                    <p class="font-semibold text-slate-900 dark:text-white truncate uppercase tracking-tight">${t.dsc}</p>
                    <p class="text-[11px] font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wide mt-0.5">${t.usr} • ${t.cat} • ${new Date(t.date).getDate()} ${monthNames[new Date(t.date).getMonth()]}</p>
                </div>
                <div class="flex items-center gap-3">
                    <p class="font-bold ${t.type === 'inc' ? 'text-emerald-600 dark:text-emerald-400' : 'text-slate-900 dark:text-slate-100'}">€${t.amt.toFixed(2)}</p>
                    <button onclick="window.deleteEntry('${t.id}')" class="text-slate-300 dark:text-slate-600 hover:text-rose-500 p-1">✕</button>
                </div></div>`).join('');
            
            updateCharts(filtered);
        };

        function updateCharts(data) {
            const isDark = document.documentElement.classList.contains('dark');
            const gridColor = isDark ? '#1e293b' : '#e2e8f0';
            const labelColor = isDark ? '#94a3b8' : '#64748b';

            // Pie Chart
            const exp = data.filter(t => t.type === 'exp');
            const catTotals = exp.reduce((acc, t) => { acc[t.cat] = (acc[t.cat] || 0) + t.amt; return acc; }, {});
            
            if(charts.pie) charts.pie.destroy();
            charts.pie = new Chart(document.getElementById('chartPie'), {
                type: 'doughnut',
                data: { labels: Object.keys(catTotals), datasets: [{ data: Object.values(catTotals), backgroundColor: catColors, borderWidth: 0 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' }
            });

            // Line Chart con ASSI VISIBILI
            const last6 = [];
            const curM = parseInt(document.getElementById('month-select').value);
            const curY = parseInt(document.getElementById('year-select').value);
            for(let i = 5; i >= 0; i--) { let d = new Date(curY, curM - i, 1); last6.push({ m: d.getMonth(), y: d.getFullYear() }); }
            
            const lineData = last6.map(obj => window.transactions.filter(t => { 
                const d = new Date(t.date); return d.getMonth() === obj.m && d.getFullYear() === obj.y && t.type === 'exp'; 
            }).reduce((s, t) => s + t.amt, 0));

            if(charts.line) charts.line.destroy();
            charts.line = new Chart(document.getElementById('chartLine'), {
                type: 'line',
                data: { labels: last6.map(o => monthNames[o.m]), datasets: [{ data: lineData, borderColor: '#0075EB', tension: 0.4, fill: false, pointRadius: 4 }] },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { color: labelColor, font: { size: 10 } }, grid: { color: gridColor } },
                        x: { ticks: { color: labelColor, font: { size: 10 } }, grid: { display: false } }
                    }
                }
            });
        }

        window.onload = () => {
            const mSel = document.getElementById('month-select');
            const ySel = document.getElementById('year-select');
            const now = new Date();
            monthNames.forEach((m, i) => mSel.innerHTML += `<option value="${i}" ${i === now.getMonth() ? 'selected' : ''}>${m}</option>`);
            for(let y = now.getFullYear() - 1; y <= now.getFullYear() + 1; y++) ySel.innerHTML += `<option value="${y}" ${y === now.getFullYear() ? 'selected' : ''}>${y}</option>`;
            window.populateAccountsDropdown();
            window.switchAccount(window.currentAccount);
        };
    </script>
</body>
</html>
